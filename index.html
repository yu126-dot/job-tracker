/* ════ DESIGN TOKENS ════
   --bg:      #0a0e17  ページ背景
   --surf:    #131929  カード・パネル
   --surf2:   #1a2236  浮き要素
   --border:  #222d42  区切り
   --accent:  #6366f1  主アクション(indigo)
   --orange:  #f97316  締切・注意
   --green:   #22c55e  内定・完了
   --red:     #ef4444  不合格
   --txt:     #f0f4ff  主テキスト

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  background:#0a0e17;
  color:#f0f4ff;
  font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;
  font-size:14px;
  min-height:100vh;
  -webkit-text-size-adjust:100%;
}
input,select,textarea{font-family:inherit;font-size:14px;}

/* ── ボタン基底: タップ領域を44px以上に ── */
.btn{
  cursor:pointer;border:none;font-family:inherit;
  transition:all 0.18s;min-height:36px;
  display:inline-flex;align-items:center;justify-content:center;
}
.btn:active{opacity:.75;transform:scale(.97);}

/* ── フォームフィールド ── */
.ifield{
  background:#1a2236;border:1.5px solid #222d42;color:#f0f4ff;
  border-radius:12px;padding:12px 16px;width:100%;outline:none;
  font-size:15px;transition:border-color .15s,box-shadow .15s;
  line-height:1.5;
}
.ifield:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18);}
textarea.ifield{resize:vertical;min-height:90px;line-height:1.7;font-size:14px;}
select.ifield{height:48px;}

/* ── タブバー ── */
.tab-bar{
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:#131929;padding:0 6px;gap:0;
  border-bottom:1px solid #222d42;
}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-item{
  cursor:pointer;padding:13px 15px;border:none;
  background:transparent;color:#8899bb;
  font-family:inherit;font-size:12px;font-weight:700;
  white-space:nowrap;flex-shrink:0;
  position:relative;transition:color .15s;
  min-height:44px;display:flex;align-items:center;
}
.tab-item::after{
  content:"";position:absolute;bottom:-1px;left:10px;right:10px;
  height:2.5px;background:transparent;border-radius:2px 2px 0 0;
  transition:background .15s;
}
.tab-item.on{color:#f0f4ff;}
.tab-item.on::after{background:#6366f1;}

/* ── フィルターchip ── */
.chip,.fbtn{
  cursor:pointer;padding:6px 14px;border-radius:99px;
  font-size:12px;font-weight:600;min-height:32px;
  border:1.5px solid #222d42;background:transparent;color:#8899bb;
  white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:inherit;
  display:inline-flex;align-items:center;
}
.chip.on,.fbtn.on{background:#6366f1;border-color:#6366f1;color:#fff;}
.chip-bar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.chip-bar::-webkit-scrollbar{display:none;}

/* ── バッジ ── */
.badge{
  display:inline-flex;align-items:center;
  padding:4px 11px;border-radius:7px;
  font-size:12px;font-weight:700;white-space:nowrap;
}

/* ── オーバーレイ / ボトムシート ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
  backdrop-filter:blur(4px);
}
.sheet{
  background:#131929;border-radius:24px 24px 0 0;
  width:100%;max-width:580px;max-height:93vh;overflow-y:auto;
  padding:14px 18px 56px;
  box-shadow:0 -12px 48px rgba(0,0,0,.6);
}
.drag,.drag-bar{
  width:44px;height:4px;background:#222d42;
  border-radius:2px;margin:0 auto 20px;
}

/* ── カード: shadow + hover ── */
.card{
  background:#131929;
  border-radius:16px;
  padding:16px 18px;
  margin-bottom:10px;
  border:1px solid #222d42;
  cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease,border-color .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.4);
  border-color:#2e3d5c;
}
.card:active{transform:scale(.985);box-shadow:0 1px 4px rgba(0,0,0,.2);}

/* ── セクションボックス ── */
.sbox{background:#0a0e17;border-radius:12px;padding:16px;border:1px solid #222d42;}

/* ── ステータスドロップダウン ── */
.sdrop{position:relative;display:inline-block;}
.sdrop-wrap{position:relative;display:inline-block;}
.sdrop-btn{
  cursor:pointer;border:none;font-family:inherit;
  font-size:12px;font-weight:700;
  padding:6px 24px 6px 11px;border-radius:8px;
  position:relative;white-space:nowrap;
  transition:opacity .15s;min-height:30px;
}
.sdrop-btn::after{
  content:"▾";position:absolute;right:7px;top:50%;
  transform:translateY(-50%);font-size:10px;opacity:.7;
}
.sdrop-menu{
  position:absolute;top:calc(100% + 6px);left:0;
  background:#1a2236;border:1px solid #222d42;
  border-radius:14px;z-index:400;min-width:170px;
  max-height:280px;overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,.6);
}
.sdrop-item{
  padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:9px;transition:background .1s;
  min-height:40px;
}
.sdrop-item:hover,.sdrop-item.active{background:#222d42;}

/* ── コピーボタン ── */
.cbtn{
  cursor:pointer;border:none;background:#1a2236;color:#8899bb;
  border-radius:7px;padding:5px 10px;font-size:12px;min-height:30px;
  font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;
  display:inline-flex;align-items:center;
}
.cbtn.ok{background:#6366f1;color:#fff;}

/* ── cred行 ── */
.cred-row{display:flex;align-items:center;gap:10px;background:#0a0e17;border-radius:10px;padding:10px 14px;}
.cred-label{font-size:11px;color:#8899bb;font-weight:700;min-width:22px;}
.cred-val{font-family:'Space Mono',monospace;font-size:13px;color:#f0f4ff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.copy-row{display:flex;align-items:center;gap:8px;background:#0a0e17;border-radius:8px;padding:8px 12px;}
.copy-label{font-size:10px;color:#8899bb;font-weight:600;min-width:20px;}
.copy-val{font-family:'Space Mono',monospace;font-size:13px;color:#f0f4ff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── Next Up バナー ── */
.next-banner{
  background:linear-gradient(135deg,#4338ca,#6366f1);
  border-radius:16px;padding:18px 20px;margin-bottom:14px;color:#fff;
  box-shadow:0 4px 16px rgba(99,102,241,.3);
}

/* ── フリップカード ── */
.flip-inner{transition:transform .45s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.flip-front,.flip-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;}
.flip-back{transform:rotateY(180deg);}

/* ── テーブル ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{
  padding:11px 14px;color:#8899bb;font-weight:600;font-size:11px;
  text-align:left;background:#0a0e17;border-bottom:1px solid #222d42;
  letter-spacing:.4px;white-space:nowrap;
}
.tbl td{padding:12px 14px;border-bottom:1px solid #1a2236;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#1a2236;}

/* ── セクション ── */
.section{
  background:#131929;border-radius:16px;
  padding:18px 20px;margin-bottom:14px;border:1px solid #222d42;
}
.section-title{
  font-size:11px;font-weight:700;color:#8899bb;
  letter-spacing:2px;margin-bottom:16px;text-transform:uppercase;
}

/* ── マイページリンク ── */
.mplink,.mp-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:9px;font-size:12px;font-weight:700;
  background:#172554;color:#60a5fa;text-decoration:none;
  white-space:nowrap;transition:opacity .15s;min-height:30px;
}
.mplink:active,.mp-link:active{opacity:.7;}

/* ── セクション見出し ── */
.sec-hd{font-size:13px;font-weight:700;margin-bottom:10px;color:#94a3b8;}

/* ── dot ── */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

/* ── アニメーション ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}
/* ── プロ仕様追加スタイル ── */
.app-header{
  background:#0d1117;
  border-bottom:1px solid #1e293b;
  padding:14px 16px 0;
  position:sticky;top:0;z-index:50;
}
.brand{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.brand-icon{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#6366f1,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.brand-name{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:#64748b;font-weight:600;letter-spacing:.5px;}
.progress-bar-wrap{
  background:#1e293b;border-radius:99px;height:4px;
  overflow:hidden;margin:0 0 12px;
}
.progress-bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#6366f1,#a855f7);
  transition:width .6s ease;
}
.stat-row{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:8px;margin-bottom:12px;
}
.stat-card{
  background:#131929;border:1px solid #1e293b;
  border-radius:10px;padding:10px 8px;text-align:center;
}
.stat-card-n{
  font-family:'Space Mono',monospace;
  font-size:20px;font-weight:700;line-height:1;
}
.stat-card-l{font-size:9px;font-weight:700;margin-top:5px;opacity:.7;letter-spacing:.3px;}
.newtab{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 14px;font-size:12px;font-weight:700;
  color:#8899bb;background:transparent;border:none;
  font-family:inherit;cursor:pointer;white-space:nowrap;
  flex-shrink:0;position:relative;
  border-bottom:2px solid transparent;transition:color .15s;
  min-height:40px;
}
.newtab.on{color:#f0f4ff;border-bottom-color:#6366f1;}
.newtab:hover{color:#e2e8f0;}
.tab-row{
  display:flex;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid #1e293b;
}
.tab-row::-webkit-scrollbar{display:none;}
::-webkit-scrollbar{display:none}
</style>

<script type="text/babel">
const {useState,useMemo,useEffect,useRef,useCallback} = React;

const SURL="https://wuuapalagxqmkypniblf.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dWFwYWxhZ3hxbWt5cG5pYmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjE1NjEsImV4cCI6MjA5MTM5NzU2MX0.nyIMqgLeLPoXZTtVkrsmxKdrk7qdMJlgnbo7fddfBcE";
const sb=supabase.createClient(SURL,SKEY);
/* ── Local storage fallback ── */
const LS_KEY="jt-v8";
function lsLoad(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function lsSave(p){try{localStorage.setItem(LS_KEY,JSON.stringify(p));}catch{}}
async function dbLoad(){

async function dbSave(payload){

  try{await sb.from("companies").update({data:{...payload,updated_at:new Date().toISOString()}}).eq("id",1);}catch{}
}

/* ステータス色定義 - 視認性を高めたデザインシステム準拠カラー */
const SC={
  "内定":           {color:"#4ade80",bg:"#052e16",order:0},
  "最終結果待ち":   {color:"#c084fc",bg:"#2e1065",order:1},
  "最終":           {color:"#a78bfa",bg:"#2e1065",order:2},
  "4次結果待ち":    {color:"#818cf8",bg:"#1e1b4b",order:3},
  "4次":            {color:"#818cf8",bg:"#1e1b4b",order:4},
  "3次結果待ち":    {color:"#60a5fa",bg:"#172554",order:5},
  "3次":            {color:"#60a5fa",bg:"#172554",order:6},
  "2次結果待ち":    {color:"#38bdf8",bg:"#082f49",order:7},
  "2次":            {color:"#38bdf8",bg:"#082f49",order:8},
  "1次結果待ち":    {color:"#fb923c",bg:"#431407",order:9},
  "1次":            {color:"#fb923c",bg:"#431407",order:10},
  "面談":           {color:"#34d399",bg:"#064e3b",order:11},
  "GD結果待ち":     {color:"#2dd4bf",bg:"#042f2e",order:12},
  "GD":             {color:"#2dd4bf",bg:"#042f2e",order:13},
  "テスト結果待ち": {color:"#f97316",bg:"#422006",order:14},
  "テスト":         {color:"#f97316",bg:"#422006",order:15},
  "書類結果待ち":   {color:"#8899bb",bg:"#1a2236",order:16},
  "書類待ち":       {color:"#8899bb",bg:"#1a2236",order:17},
  "未着手":         {color:"#4a5568",bg:"#131929",order:18},
  "辞退":           {color:"#4a5568",bg:"#131929",order:19},
  "不合格":         {color:"#f87171",bg:"#450a0a",order:20},
};
const STATUSES=Object.keys(SC);
const EMPTY={name:"",status:"未着手",memo:"",agency:false,priority:0,deadline:"",deadlineType:"その他",deadlineLabel:"",dlPriority:"",schedule:"",scheduleLabel:"",mypageUrl:"",mypageId:"",mypagePw:"",motivation:"",interviewNotes:"",companyResearch:"",history:[],companyEs:[],rejectedAt:"",cmp:{salary:"",salary30:"",location:"",business:"",culture:"",overtime:"",benefits:"",note:"",scores:{salary:0,salary30:0,location:0,business:0,culture:0,overtime:0,benefits:0}}};

function ens(c){return{...EMPTY,...c,history:c.history||[],companyEs:c.companyEs||[],rejectedAt:c.rejectedAt||"",dlPriority:c.dlPriority||"",companyResearch:c.companyResearch||"",priority:c.priority||0,deadlineType:c.deadlineType||"その他",cmp:{...EMPTY.cmp,...(c.cmp||{}),scores:{...EMPTY.cmp.scores,...(c.cmp?.scores||{})}}};}
function fmt(dt){
  if(!dt)return null;
  const d=new Date(dt),now=new Date(),diff=(d-now)/864e5;
  const mm=d.getMonth()+1,dd=d.getDate(),hh=d.getHours(),mn=String(d.getMinutes()).padStart(2,"0");
  return{str:`${mm}/${dd} ${hh}:${mn}`,urgent:diff>=0&&diff<3,past:diff<0};
}

// ── クリップボードコピー (PC/スマホ両対応) ─────────────
// navigator.clipboard が使えない環境 (http, 古いブラウザ) では
// execCommand フォールバックを使用
async function copyToClipboard(text) {
  // 方法1: Clipboard API (推奨・HTTPS必須)
  if(navigator.clipboard && window.isSecureContext) {
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch{}
  }
  // 方法2: execCommand フォールバック (古いブラウザ・http)
  try{
    const el = document.createElement("textarea");
    el.value = text;
    el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;";
    document.body.appendChild(el);
    el.focus();
    el.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(el);
    if(ok) return true;
  }catch{}
  // 方法3: prompt でテキスト表示（完全フォールバック）
  prompt("コピーしてください (Ctrl+C / Cmd+C):", text);
  return false;
}

// ── Copy Button ─────────────────────────────────────
function CBtn({text,label}){
  const [ok,setOk]=useState(false);
  const go=async e=>{e.stopPropagation();const r=await copyToClipboard(text);if(r){setOk(true);setTimeout(()=>setOk(false),1400);}};
  return<button className={`cbtn${ok?" ok":""}`} onClick={go}>{ok?"✓ 済":label||"copy"}</button>;
}

// ── CopyPill: ID/PW用の大きめコピーボタン ──
// タップ領域を広く取り、PW は伏せ字表示
function CopyPill({text, label, icon="📋", secret=false}){
  const [ok, setOk] = useState(false);
  const go = async e => {
    e.stopPropagation();
    const r = await copyToClipboard(text);
    if(r){ setOk(true); setTimeout(()=>setOk(false),1600); }
  };
  return(
    <button className="btn" onClick={go} style={{
      flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,
      padding:"8px 10px",borderRadius:9,minHeight:36,
      background: ok ? "#6366f1" : "#1a2236",
      border: `1px solid ${ok ? "#6366f1" : "#222d42"}`,
      color: ok ? "#fff" : "#94a3b8",
      fontSize:12,fontWeight:700,transition:"all .2s",
    }}>
      {ok ? "✓ コピー済" : <>{icon} {label}</>}
    </button>
  );
}

// ── Inline copy row (ID/PW) ─────────────────────────
function CredsRow({id,pw}){
  const [showPw,setShowPw]=useState(false);
  if(!id&&!pw)return null;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:6}} onClick={e=>e.stopPropagation()}>
      {id&&(
        <div className="copy-row">
          <span className="copy-label">ID</span>
          <span className="copy-val">{id}</span>
          <CBtn text={id} label="copy"/>
        </div>
      )}
      {pw&&(
        <div className="copy-row">
          <span className="copy-label">PW</span>
          <span className={`copy-val${showPw?"":" pw"}`}>{showPw?pw:"••••••••"}</span>
          <button className="cbtn" onClick={e=>{e.stopPropagation();setShowPw(v=>!v);}}>{showPw?"hide":"show"}</button>
          <CBtn text={pw} label="copy"/>
        </div>
      )}
    </div>
  );
}

// ── Status Dropdown ─────────────────────────────────
function StatusDrop({value,onChange}){
  const [open,setOpen]=useState(false);
  const [menuPos,setMenuPos]=useState({top:0,left:0});
  const btnRef=useRef(null);
  const ref=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};
  },[]);
  const handleOpen=e=>{
    e.stopPropagation();
    if(!open&&btnRef.current){
      const r=btnRef.current.getBoundingClientRect();
      setMenuPos({top:r.bottom+4,left:r.left});
    }
    setOpen(o=>!o);
  };
  const s=SC[value]||SC["未着手"];
  return(
    <div className="sdrop-wrap" ref={ref} onClick={e=>e.stopPropagation()}>
      <button ref={btnRef} className="sdrop-btn" onClick={handleOpen}
        style={{color:s.color,background:s.bg}}>
        {value}
      </button>
      {open&&(
        <div className="sdrop-menu" style={{
          position:"fixed",
          top:menuPos.top,left:menuPos.left,
          zIndex:9999,
        }}>
          {STATUSES.map(s=>{
            const c=SC[s];
            return(
              <div key={s} className={`sdrop-item${s===value?" active":""}`}
                onClick={e=>{e.stopPropagation();onChange(s);setOpen(false);}}>
                <span className="dot" style={{background:c.color}}/>
                <span style={{color:c.color}}>{s}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── スコアリングエンジン ───────────────────────────────────
function scoreCompany(c) {
  // スキップ: 終了済み
  if(["不合格","辞退"].includes(c.status)) return -1;

  const now = new Date();
  let score = 0;

  // ① 締切の近さ (0-60点) - 最重要
  if(c.deadline) {
    const days = (new Date(c.deadline) - now) / 864e5;
    if(days < 0)       score += 0;   // 期限切れ
    else if(days < 1)  score += 60;  // 今日
    else if(days < 2)  score += 55;  // 明日
    else if(days < 4)  score += 45;  // 3日以内
    else if(days < 8)  score += 30;  // 1週間以内
    else if(days < 15) score += 15;  // 2週間以内
    else               score += 5;
  }

  // ② 面接・予定の近さ (0-50点)
  if(c.schedule) {
    const days = (new Date(c.schedule) - now) / 864e5;
    if(days < 0)       score += 0;
    else if(days < 1)  score += 50;  // 今日
    else if(days < 2)  score += 45;  // 明日
    else if(days < 4)  score += 35;  // 3日以内
    else if(days < 8)  score += 20;
    else               score += 5;
  }

  // ③ 志望度 (0-25点)
  score += (c.priority || 0) * 5;

  // ④ 選考ステージ重要度 (0-30点)
  const stageScore = {
    "最終":25, "最終結果待ち":5,
    "4次":23, "4次結果待ち":4,
    "3次":21, "3次結果待ち":3,
    "2次":19, "2次結果待ち":3,
    "1次":17, "1次結果待ち":3,
    "GD":14, "GD結果待ち":3,
    "テスト":12, "テスト結果待ち":3,
    "面談":14,
    "書類待ち":10, "書類結果待ち":3,
    "未着手":8, "内定":6,
  };
  score += stageScore[c.status] || 5;

  // ⑤ 放置期間ボーナス (0-15点)
  const lastActivity = c.history?.length > 0
    ? new Date(c.history[c.history.length-1].id)
    : new Date(0);
  const staleDays = (now - lastActivity) / 864e5;
  if(staleDays > 14) score += 15;
  else if(staleDays > 7) score += 8;
  else if(staleDays > 3) score += 3;

  return score;
}

// ── 具体アクション生成 (スケジュール・締切も考慮) ─────────
function getNextAction(c) {
  const now = new Date();
  const base = ACTION_MAP[c.status] || {text:"状況を確認",icon:"📌",color:"#8899bb",type:"check"};

  // 締切が近い場合は上書き
  if(c.deadline) {
    const days = (new Date(c.deadline) - now) / 864e5;
    if(days >= 0 && days < 1)
      return {...base, text:`今日締切！${c.deadlineLabel||c.deadlineType||"提出"}を完了させる`, urgent:true};
    if(days >= 0 && days < 3)
      return {...base, text:`${Math.ceil(days)}日後締切 → ${c.deadlineLabel||"提出"}を急ぐ`, urgent:true};
  }

  // 面接が近い場合は上書き
  if(c.schedule) {
    const days = (new Date(c.schedule) - now) / 864e5;
    if(days >= 0 && days < 1)
      return {...base, text:`今日${c.scheduleLabel||"面接"}！最終確認を`, urgent:true, color:"#ef4444"};
    if(days >= 0 && days < 2)
      return {...base, text:`明日${c.scheduleLabel||"面接"} → 今夜が最後の準備`, urgent:true};
    if(days >= 0 && days < 5)
      return {...base, text:`${Math.ceil(days)}日後${c.scheduleLabel||"面接"} → ${base.text}`};
  }

  return base;
}

    const next=[...dismissed,id];

  };

  const now = new Date();

  const todayItems = active
    .filter(c=>!dismissed.includes(c.id))
    .filter(c=>!completedDLs.includes(`${c.id}_${c.deadlineLabel||""}`))
    .map(c=>{
      const dl = c.deadline ? new Date(c.deadline) : null;
      const sc = c.schedule ? new Date(c.schedule) : null;
      const dlDays = dl ? (dl-now)/864e5 : 999;
      const scDays = sc ? (sc-now)/864e5 : 999;
      const minDays = Math.min(dlDays, scDays);
      const isToday = minDays >= 0 && minDays < 1;
      const isTomorrow = minDays >= 1 && minDays < 2;
      const isUrgent = minDays >= 0 && minDays < 3;
      // 今日・明日の締切/面接 OR 最終面接直前
      const qualifies = isUrgent ||
        (["最終","4次"].includes(c.status) && scDays < 5);
      return {...c, _act:getNextAction(c), _minDays:minDays,
              _isToday:isToday, _isTomorrow:isTomorrow, _isUrgent:isUrgent, qualifies};
    })

// ── Next Up Banner ──────────────────────────────────
function NextUpBanner({companies}){
  const now=new Date();
  const events=[];
  companies.forEach(c=>{
    if(c.deadline){const d=new Date(c.deadline);if(d>now)events.push({name:c.name,label:c.deadlineLabel||"締切",dt:d,type:"deadline",status:c.status});}
    if(c.schedule){const d=new Date(c.schedule);if(d>now)events.push({name:c.name,label:c.scheduleLabel||"予定",dt:d,type:"schedule",status:c.status});}
  });
  events.sort((a,b)=>a.dt-b.dt);

  // Offer countdowns
  const offerDeadlines=companies.filter(c=>c.deadline&&(c.deadlineLabel||"").includes("内定")).map(c=>({name:c.name,dt:new Date(c.deadline),label:c.deadlineLabel})).filter(x=>x.dt>now).sort((a,b)=>a.dt-b.dt);

  const next=events[0];
  if(!next&&offerDeadlines.length===0)return null;

  const diffDays=(dt)=>Math.ceil((dt-now)/864e5);
  const fmtNext=(dt)=>{
    const diff=diffDays(dt);
    const mm=dt.getMonth()+1,dd=dt.getDate(),hh=dt.getHours(),mn=String(dt.getMinutes()).padStart(2,"0");
    const dayStr=diff===0?"今日":diff===1?"明日":`${diff}日後`;
    return{dayStr,timeStr:`${mm}/${dd} ${hh}:${mn}`};
  };

  return(
    <div style={{padding:"0 12px 10px"}}>
      {/* Next event */}
      {next&&(()=>{
        const {dayStr,timeStr}=fmtNext(next.dt);
        const isUrgent=diffDays(next.dt)<=1;
        const isDeadline=next.type==="deadline";
        return(
          <div style={{background:isUrgent?"#1a0500":"#131929",border:`1.5px solid ${isUrgent?"#d97706":"#222d42"}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{fontSize:10,color:"#8899bb",fontWeight:600,letterSpacing:1.5,marginBottom:6}}>NEXT {isDeadline?"締切":"予定"}</div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <div style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:700,color:isUrgent?"#f97316":"#e6edf3",lineHeight:1}}>{dayStr}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{next.name}</div>
                <div style={{fontSize:12,color:isDeadline?"#f97316":"#a371f7",marginTop:1}}>{next.label} · {timeStr}</div>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:SC[next.status]?.color,background:SC[next.status]?.bg||"#1a2236",padding:"2px 8px",borderRadius:4,border:`1px solid ${SC[next.status]?.bg||"#222d42"}`,flexShrink:0}}>{next.status}</span>
            </div>
          </div>
        );
      })()}

      {/* Offer countdowns */}
      {offerDeadlines.length>0&&(
        <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
          {offerDeadlines.map((o,i)=>{
            const diff=diffDays(o.dt);
            const urgent=diff<=3;
            return(
              <div key={i} style={{background:urgent?"#1a0500":"#131929",border:`1px solid ${urgent?"#d97706":"#222d42"}`,borderRadius:8,padding:"8px 12px",flexShrink:0,minWidth:140}}>
                <div style={{fontSize:10,color:"#8899bb",fontWeight:600,letterSpacing:1,marginBottom:3}}>内定承諾期限</div>
                <div style={{fontSize:13,fontWeight:700,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{o.name}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:20,fontWeight:700,color:urgent?"#ef4444":"#f97316"}}>{diff}</span>
                  <span style={{fontSize:11,color:"#8899bb"}}>日後</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ② 通知スケジューラー

function useNotifications(companies, loaded) {
  useEffect(()=>{
    if(!loaded) return;
    if(typeof Notification==="undefined") return;
    if(Notification.permission==="default") Notification.requestPermission();
    if(Notification.permission!=="granted") return;

    const timers=[];
    const now=new Date();
    companies.forEach(c=>{
      if(!c.deadline) return;
      const dt=new Date(c.deadline);
      const diff=dt-now;
      if(diff<=0) return;
      // 3日前
      if(diff>0&&diff<=3*864e5){
        const days=Math.ceil(diff/864e5);
        timers.push(setTimeout(()=>{
          try{new Notification(`⏰ 締切 ${days}日前: ${c.name}`,{
            body:`${c.deadlineLabel||c.deadlineType||"締切"} ${dt.getMonth()+1}/${dt.getDate()}`,
            icon:"/favicon.ico"
          });}catch{}
        },100));
      }
      // 当日朝9時
      const morning=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate(),9,0,0);
      const toMorning=morning-now;
      if(toMorning>0&&toMorning<864e5){
        timers.push(setTimeout(()=>{
          try{new Notification(`🚨 今日締切: ${c.name}`,{
            body:`${c.deadlineLabel||"締切"} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,"0")}まで`,
            icon:"/favicon.ico"
          });}catch{}
        },toMorning));
      }
    });
    return()=>timers.forEach(clearTimeout);
  },[companies,loaded]);
}

function buildUserContext(companies, prep, esBank, profile) {
  if(!profile) profile = {};
  const wc = prep.willcan || {};
  const offers = companies.filter(c=>c.status==="内定");
  const active = companies.filter(c=>!["未着手","不合格","辞退"].includes(c.status));
  const rejected = companies.filter(c=>c.status==="不合格");
  const historyParts = Object.entries(prep.history||{}).map(([era,h])=>
    h.event ? `  [${era}] ${h.event} | 感情:${h.emotion||"—"} | 得たもの:${h.skill||"—"} | モチベ:${h.motivation||"?"}/5` : ""
  ).filter(Boolean);
  const treeParts = (wc.trees||[]).map(t=>
    `  【${t.title}】エピソード:${t.episodes||""} / 行動:${t.actions||""} / スキル:${t.skills||""} / 価値観:${t.values||""}`
  );
  const qaParts = (prep.qa||[]).filter(q=>q.a).slice(0,5).map(q=>`  Q: ${q.q}\n  A: ${q.a}`);
  const esParts = esBank.slice(0,4).map(e=>`  [${e.category}]${e.title?" "+e.title:""}: ${e.content.slice(0,200)}`);
  return [
    "=== 【志望プロフィール】===",
    `業界: ${profile.industry||"未設定"} | 職種: ${profile.role||"未設定"} | 企業規模: ${profile.size||"未設定"}`,
    profile.keywords ? `重視キーワード: ${profile.keywords}` : null,
    "",
    "=== 【選考状況】===",
    `応募${companies.filter(c=>c.status!=="未着手").length}社 / 内定${offers.length}社 / 選考中${active.length}社 / 不合格${rejected.length}社`,
    offers.length ? `内定先: ${offers.map(c=>c.name).join("、")}` : null,
    "",
    "=== 【自分史・経験】===",
    ...historyParts,
    "",
    "=== 【強み・軸】===",
    wc.will ? `やりたいこと: ${wc.will}` : null,
    wc.can  ? `できること: ${wc.can}` : null,
    wc.must ? `身につけたいこと: ${wc.must}` : null,
    wc.core ? `価値観・軸: ${wc.core}` : null,
    "",
    "=== 【主要エピソード】===",
    ...treeParts,
    "",
    "=== 【面接Q&A準備済み回答】===",
    ...qaParts,
    "",
    "=== 【保有ES】===",
    ...esParts,
  ].filter(l=>l!==null&&l!==undefined).join("\n");
}

// ── 企業別ES管理 ─────────────────────────────────────
function CompanyESSection({entries, onChange, esBank, onEsAdd}) {
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({title:"", content:""});
  const [showBankPicker, setShowBankPicker] = useState(false);
  const [addedToBank, setAddedToBank] = useState({});

  const openNew = () => { setForm({title:"", content:""}); setEditId("new"); };
  const openEdit = (e) => { setForm({title:e.title, content:e.content}); setEditId(e.id); };
  const save = () => {
    if(!form.title.trim()&&!form.content.trim()) return;
    if(editId==="new") onChange([...entries, {id:Date.now(), title:form.title, content:form.content}]);
    else onChange(entries.map(e=>e.id===editId?{...e,...form}:e));
    setEditId(null);
  };
  const del = (id) => { if(window.confirm("削除しますか？")) onChange(entries.filter(e=>e.id!==id)); };

  const pushToBank = (e) => {
    if(!onEsAdd) return;
    onEsAdd({id:Date.now(), title:e.title||"企業別ES", category:"その他", content:e.content});
    setAddedToBank(x=>({...x,[e.id]:true}));
    setTimeout(()=>setAddedToBank(x=>({...x,[e.id]:false})),2500);
  };

  const pullFromBank = (bankEntry) => {
    onChange([...entries, {id:Date.now(), title:bankEntry.title||bankEntry.category, content:bankEntry.content}]);
    setShowBankPicker(false);
  };

  // ESバンク引用ピッカー
  if(showBankPicker) return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button className="btn" onClick={()=>setShowBankPicker(false)} style={{background:"#1a2236",color:"#8899bb",borderRadius:6,padding:"4px 10px",fontSize:12}}>← 戻る</button>
        <span style={{fontSize:13,fontWeight:700,color:"#f0f4ff"}}>ESバンクから引用</span>
      </div>
      {esBank.length===0
        ? <div style={{textAlign:"center",color:"#4a5568",fontSize:12,padding:"20px 0"}}>ESバンクにESが登録されていません<br/>ESタブから先に追加してください</div>
        : <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {esBank.map(b=>(
              <div key={b.id} style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>{b.title||b.category}</div>
                    <span style={{fontSize:10,background:"#1e293b",color:"#64748b",padding:"1px 6px",borderRadius:4,fontWeight:600}}>{b.category}</span>
                  </div>
                  <button className="btn" onClick={()=>pullFromBank(b)}
                    style={{background:"#1e3a5f",color:"#60a5fa",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700,border:"1px solid #1d4ed8",flexShrink:0}}>
                    引用する
                  </button>
                </div>
                <div style={{fontSize:12,color:"#475569",lineHeight:1.6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{b.content}</div>
                <div style={{textAlign:"right",marginTop:4}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#4a5568"}}>{b.content.length}字</span>
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );

  // ES編集フォーム
  if(editId!==null) return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button className="btn" onClick={()=>setEditId(null)} style={{background:"#1a2236",color:"#8899bb",borderRadius:6,padding:"4px 10px",fontSize:12}}>← 戻る</button>
        <span style={{fontSize:13,fontWeight:700,color:"#f0f4ff"}}>{editId==="new"?"ES追加":"ES編集"}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div>
          <div style={{fontSize:11,color:"#8899bb",fontWeight:600,marginBottom:4}}>設問タイトル</div>
          <input className="ifield" placeholder="例: 自己PR 300字、ガクチカ 400字" value={form.title} onChange={e=>setForm(x=>({...x,title:e.target.value}))} style={{fontSize:13}}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{fontSize:11,color:"#8899bb",fontWeight:600}}>ES本文</div>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:form.content.length>0?"#a5b4fc":"#4a5568"}}>{form.content.length}字</span>
          </div>
          <textarea className="ifield" placeholder="ESの内容を記入…" value={form.content} onChange={e=>setForm(x=>({...x,content:e.target.value}))} style={{minHeight:160,fontSize:13,lineHeight:1.75}}/>
        </div>
        <button className="btn" onClick={save} style={{background:"#6366f1",color:"#fff",borderRadius:10,padding:"11px",fontSize:13,fontWeight:700}}>💾 保存する</button>
      </div>
    </div>
  );

  // ES一覧
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:11,color:"#8899bb",fontWeight:700}}>企業別 ES（{entries.length}件）</div>
        <div style={{display:"flex",gap:6}}>
          {esBank?.length>0&&(
            <button className="btn" onClick={()=>setShowBankPicker(true)}
              style={{background:"#0c2545",color:"#38bdf8",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,border:"1px solid #0369a1"}}>
              📥 バンクから引用
            </button>
          )}
          <button className="btn" onClick={openNew}
            style={{background:"#1a2236",color:"#a5b4fc",borderRadius:6,padding:"4px 12px",fontSize:11,fontWeight:700,border:"1px solid #3730a3"}}>
            ＋ 追加
          </button>
        </div>
      </div>
      {entries.length===0
        ? <div style={{textAlign:"center",color:"#4a5568",fontSize:12,padding:"16px 0",lineHeight:1.8}}>
            まだESが保存されていません<br/>
            「＋ 追加」で新規作成、または<br/>「📥 バンクから引用」でESバンクから取得できます
          </div>
        : <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {entries.map(e=>(
              <div key={e.id} style={{background:"#0a0e17",borderRadius:10,padding:"12px 14px",border:"1px solid #1e293b"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",flex:1}}>{e.title||"（タイトルなし）"}</div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    <button className="btn" onClick={()=>pushToBank(e)}
                      style={{background:addedToBank[e.id]?"#052e16":"#0d2b12",color:addedToBank[e.id]?"#4ade80":"#22c55e",borderRadius:5,padding:"3px 9px",fontSize:10,fontWeight:700,border:`1px solid ${addedToBank[e.id]?"#16a34a":"#16a34a44"}`}}>
                      {addedToBank[e.id]?"✓ 追加済":"→ バンクへ"}
                    </button>
                    <button className="btn" onClick={()=>openEdit(e)} style={{background:"#1a2236",color:"#a5b4fc",borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:600,border:"1px solid #3730a3"}}>編集</button>
                    <button className="btn" onClick={()=>del(e.id)} style={{background:"transparent",color:"#4a5568",borderRadius:5,padding:"3px 7px",fontSize:13}}>✕</button>
                  </div>
                </div>
                <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{e.content||"（内容なし）"}</div>
                <div style={{textAlign:"right",marginTop:4}}>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#4a5568"}}>{(e.content||"").length}字</span>
                </div>
              </div>
            ))}
          </div>
      }
    </div>
  );

// ── Calendar ────────────────────────────────────────
function CalView({companies,onEdit}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [selDay,setSelDay]=useState(null);

  const events=useMemo(()=>{
    const map={};
    companies.forEach(c=>{
      [{dt:c.deadline,type:"deadline",label:c.deadlineLabel||""},{dt:c.schedule,type:"schedule",label:c.scheduleLabel||""}].forEach(({dt,type,label})=>{
        if(!dt)return;
        const d=new Date(dt);
        if(d.getFullYear()===year&&d.getMonth()===month){
          const k=d.getDate();if(!map[k])map[k]=[];
          map[k].push({name:c.name,type,label,status:c.status,dt:d,company:c});
        }
      });
    });
    return map;
  },[companies,year,month]);

  const firstDay=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(null);
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  const pm=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const nm=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};

  const upcoming=[];
  companies.forEach(c=>{
    if(c.deadline){const d=new Date(c.deadline);if(d>=today)upcoming.push({name:c.name,type:"deadline",label:c.deadlineLabel||"",dt:d,status:c.status,company:c});}
    if(c.schedule){const d=new Date(c.schedule);if(d>=today)upcoming.push({name:c.name,type:"schedule",label:c.scheduleLabel||"",dt:d,status:c.status,company:c});}
  });
  upcoming.sort((a,b)=>a.dt-b.dt);

  return(
    <div>
      {upcoming.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"#8899bb",marginBottom:8,letterSpacing:2,fontWeight:600}}>直近のスケジュール</div>
          {upcoming.slice(0,8).map((e,i)=>{
            const diff=(e.dt-today)/864e5,isU=diff<3,isD=e.type==="deadline";
            const mm=e.dt.getMonth()+1,dd=e.dt.getDate(),hh=e.dt.getHours(),mn=String(e.dt.getMinutes()).padStart(2,"0");
            return(
              <div key={i} style={{background:"#131929",border:`1px solid ${isU?"#d97706":"#222d42"}`,borderRadius:8,padding:"9px 12px",marginBottom:6,cursor:"pointer"}} onClick={()=>onEdit(e.company)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:isU?"#f97316":"#8899bb",minWidth:50,lineHeight:1.4,flexShrink:0}}>
                    <div>{mm}/{dd}</div><div>{hh}:{mn}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{e.name}</div>
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:3,background:isD?"#d9770622":"#6e40c922",color:isD?"#f97316":"#a371f7",fontWeight:600}}>{isD?"締切":"面接"}</span>
                      {e.label&&<span style={{fontSize:11,color:"#8899bb"}}>📌{e.label}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end",flexShrink:0}}>
                    <span style={{fontSize:11,fontWeight:700,color:SC[e.status]?.color}}>{e.status}</span>
                    {e.company.mypageUrl&&<button className="btn mp-link" style={{fontSize:10,padding:"2px 7px"}} onClick={ev=>{ev.stopPropagation();window.open(e.company.mypageUrl,"_blank");}}>🌐</button>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button className="btn" onClick={pm} style={{background:"#131929",color:"#8899bb",borderRadius:8,padding:"7px 14px",fontSize:14,border:"1px solid #222630"}}>‹</button>
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:"#f0f4ff"}}>{year}.{String(month+1).padStart(2,"0")}</span>
        <button className="btn" onClick={nm} style={{background:"#131929",color:"#8899bb",borderRadius:8,padding:"7px 14px",fontSize:14,border:"1px solid #222630"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
        {["日","月","火","水","木","金","土"].map((d,i)=>(
          <div key={d} style={{textAlign:"center",fontSize:10,color:i===0?"#ef4444":i===6?"#58a6ff":"#8899bb",padding:"3px 0",fontWeight:600}}>{d}</div>
        ))}
      </div>
      {weeks.map((week,wi)=>(
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
          {week.map((day,di)=>{
            if(!day)return<div key={di}/>;
            const isToday=day===today.getDate()&&year===today.getFullYear()&&month===today.getMonth();
            const dayEvts=events[day]||[];
            return(
              <div key={di} style={{borderRadius:6,minHeight:54,padding:4,border:`1px solid ${isToday?"#6366f1":dayEvts.length?"#222d42":"#222d42"}`,background:isToday?"#1a3066":"#131929",cursor:"pointer"}} onClick={()=>setSelDay(day)}>
                <div style={{fontSize:10,color:isToday?"#a5b4fc":di===0?"#ef4444":di===6?"#60a5fa":"#8899bb",fontWeight:isToday?700:400,textAlign:"right",marginBottom:1}}>{day}</div>
                {dayEvts.slice(0,2).map((e,ei)=>(
                  <div key={ei} style={{borderRadius:3,padding:"2px 3px",fontSize:9,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",background:e.type==="deadline"?"#d9770622":"#6e40c922",color:e.type==="deadline"?"#f97316":"#a371f7"}}>
                    {e.type==="deadline"?"📅":"🗓"}{e.name.slice(0,4)}
                  </div>
                ))}
                {dayEvts.length>2&&<div style={{fontSize:8,color:"#8899bb",marginTop:1}}>+{dayEvts.length-2}</div>}
              </div>
            );
          })}
        </div>
      ))}
      {upcoming.length===0&&<div style={{textAlign:"center",color:"#4b5563",padding:"32px 0",fontSize:12}}>予定なし</div>}
      {selDay&&<DaySheet day={selDay} year={year} month={month} events={events} onEdit={onEdit} onClose={()=>setSelDay(null)}/>}
    </div>
  );
}

const DL_TYPES=["ES","テスト","動画面接","内定承諾","その他"];
const DL_COLORS={"ES":"#58a6ff","テスト":"#f97316","動画面接":"#a371f7","内定承諾":"#22c55e","その他":"#8899bb"};

function PriorityStars({value,onChange,size=14}){

function DeadlineList({companies, completedDLs=[], onToggle}){
  const [showDone, setShowDone] = useState(false);
  const now=new Date();
  const all=[];
  companies.forEach(c=>{
    if(c.deadline){
      const d=new Date(c.deadline);
      const diff=Math.ceil((d-now)/864e5);
      const key=`${c.id}_${c.deadlineLabel||""}`;
      const done=completedDLs.includes(key);
      all.push({name:c.name,dt:d,diff,type:c.deadlineType||"その他",label:c.deadlineLabel||"",
        key,status:c.status,dlPriority:c.dlPriority||"",past:d<now,done});
    }
  });
  const PRIO={"高":0,"中":1,"低":2,"":3};
  all.sort((a,b)=>{
    const pd=(PRIO[a.dlPriority||""]||3)-(PRIO[b.dlPriority||""]||3);
    if(pd!==0)return pd;
    return a.dt-b.dt;
  });

  const renderRow=(x)=>{
    const col=DL_COLORS[x.type]||"#8899bb";
    const mm=x.dt.getMonth()+1,dd=x.dt.getDate(),hh=x.dt.getHours(),mn=String(x.dt.getMinutes()).padStart(2,"0");
    return(
      <div key={x.key} style={{display:"flex",alignItems:"center",gap:10,
        background:x.done?"#0d1a0f":"#131929",
        border:`1px solid ${x.done?"#16a34a44":col+"44"}`,
        borderRadius:10,padding:"10px 12px",marginBottom:6,
        opacity:x.done?0.7:1}}>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,
          color:x.past&&!x.done?"#4a5568":col,textAlign:"center",flexShrink:0,minWidth:32}}>
          <div>{mm}/{dd}</div><div>{hh}:{mn}</div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
            {x.dlPriority&&<span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,
              background:x.dlPriority==="高"?"#450a0a":x.dlPriority==="中"?"#422006":"#1a2236",
              color:x.dlPriority==="高"?"#ef4444":x.dlPriority==="中"?"#f97316":"#8899bb"}}>
              {x.dlPriority}優先</span>}
            <div style={{fontSize:13,fontWeight:600,
              color:x.done?"#22c55e":x.past?"#4a5568":"#f0f4ff",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {x.done&&"✅ "}{x.name}
            </div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center"}}>
            <span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:3,
              background:col+"22",color:col}}>{x.type}</span>
            {x.label&&<span style={{fontSize:11,color:"#8899bb"}}>{x.label}</span>}
            {!x.past&&!x.done&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:10,
              color:x.diff<=0?"#ef4444":x.diff<=3?"#f97316":x.diff<=7?"#fbbf24":"#8899bb"}}>
              {x.diff<=0?"今日":x.diff===1?"明日":`${x.diff}日後`}
            </span>}
          </div>
        </div>
        <span style={{fontSize:11,fontWeight:700,color:SC[x.status]?.color,flexShrink:0}}>{x.status}</span>
        {onToggle&&(
          <button className="btn" onClick={()=>onToggle(x.key)}
            style={{background:x.done?"#052e16":"#131929",
              border:`1px solid ${x.done?"#16a34a":"#222d42"}`,
              borderRadius:8,padding:"5px 8px",fontSize:14,flexShrink:0,
              color:x.done?"#22c55e":"#4a5568"}}>
            {x.done?"✅":"○"}
          </button>
        )}
      </div>
    );
  };

  const active = all.filter(x=>!x.done);
  const done_list = all.filter(x=>x.done);
  const upcoming = active.filter(x=>!x.past);
  const past_active = active.filter(x=>x.past);

  if(all.length===0)return<div style={{textAlign:"center",color:"#4b5563",padding:"32px 0",fontSize:12}}>締め切りが登録されていません</div>;
  return(
    <div>
      {upcoming.length>0&&<>
        <div style={{fontSize:10,color:"#8899bb",marginBottom:8,letterSpacing:2,fontWeight:700}}>📅 今後の締め切り</div>
        {upcoming.map(x=>renderRow(x))}
      </>}
      {past_active.length>0&&<>
        <div style={{fontSize:10,color:"#8899bb",margin:"14px 0 8px",letterSpacing:2,fontWeight:700}}>⏰ 期限切れ</div>
        {past_active.map(x=>renderRow(x))}
      </>}
      {done_list.length>0&&(
        <div style={{marginTop:14}}>
          <button className="btn" onClick={()=>setShowDone(v=>!v)}
            style={{width:"100%",display:"flex",justifyContent:"space-between",
              alignItems:"center",background:"#0d1a0f",
              border:"1px solid #16a34a44",borderRadius:10,padding:"10px 14px",marginBottom:showDone?6:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span>✅</span>
              <span style={{fontSize:12,fontWeight:700,color:"#22c55e"}}>完了した締め切り</span>
              <span style={{fontSize:10,background:"#052e16",color:"#22c55e",
                padding:"1px 8px",borderRadius:99,fontWeight:700}}>{done_list.length}件</span>
            </div>
            <span style={{fontSize:11,color:"#4a5568"}}>{showDone?"▲":"▼"}</span>
          </button>
          {showDone&&done_list.map(x=>renderRow(x))}
        </div>
      )}
    </div>
  );
}


function ListView({companies,filter,setFilter,counts,onStatusChange,onDetail,onDel,onPriorityChange,completedDLs=[],onToggleDL}){
  const [sort,setSort]=useState("status");
  const [subTab,setSubTab]=useState("list");
  const [viewMode,setViewMode]=useState("card");
  const [openDropId,setOpenDropId]=useState(null);
  const [searchQuery,setSearchQuery]=useState("");

  const sorted=[...companies].sort((a,b)=>{
    if(sort==="priority")return(b.priority||0)-(a.priority||0);
    if(sort==="name")return a.name.localeCompare(b.name,"ja");
    if(sort==="deadline"){
      const da=a.deadline?new Date(a.deadline):new Date("9999");
      const db=b.deadline?new Date(b.deadline):new Date("9999");
      return da-db;
    }
    return (SC[a.status]?.order??99)-(SC[b.status]?.order??99);
  });
  const q=searchQuery.trim().toLowerCase();
  const filtered=(filter==="すべて"?sorted:sorted.filter(c=>c.status===filter))
    .filter(c=>!q||c.name.toLowerCase().includes(q)||c.memo?.toLowerCase().includes(q));

  // Close dropdown when clicking outside
  useEffect(()=>{
    const h=()=>setOpenDropId(null);
    document.addEventListener("click",h);
    return()=>document.removeEventListener("click",h);
  },[]);

  return(
    <div>
      {/* ── 検索バー ── */}
      <div style={{position:"relative",marginBottom:8}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#4a5568",pointerEvents:"none"}}>🔍</span>
        <input
          className="ifield"
          placeholder="企業名・メモで検索…"
          value={searchQuery}
          onChange={e=>setSearchQuery(e.target.value)}
          style={{paddingLeft:32,fontSize:13,background:"#0d1117",border:"1px solid #1e293b",color:"#e2e8f0"}}
        />
        {searchQuery&&<button className="btn" onClick={()=>setSearchQuery("")}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"transparent",color:"#4a5568",fontSize:14,padding:"2px 6px"}}>✕</button>}
      </div>
      {/* ── Row 1: サブタブ + 表示切替 (1行) ── */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
        {/* サブタブ */}
        <div style={{display:"flex",background:"#0a0e17",borderRadius:8,border:"1px solid #222630",overflow:"hidden",flexShrink:0}}>
          <button className="btn" onClick={()=>setSubTab("list")} style={{padding:"5px 11px",fontSize:12,fontWeight:600,background:subTab==="list"?"#6366f1":"transparent",color:subTab==="list"?"#fff":"#8899bb",borderRadius:0}}>📋 一覧</button>
          <button className="btn" onClick={()=>setSubTab("dl")} style={{padding:"5px 11px",fontSize:12,fontWeight:600,background:subTab==="dl"?"#6366f1":"transparent",color:subTab==="dl"?"#fff":"#8899bb",borderRadius:0}}>📅 締切</button>
        </div>
        {/* 表示切替 + ソート (サブタブ=list のときのみ) */}
        {subTab==="list"&&<>
          <div style={{display:"flex",background:"#0a0e17",borderRadius:8,border:"1px solid #222630",overflow:"hidden",flexShrink:0}}>
            <button className="btn" onClick={()=>setViewMode("table")} style={{padding:"5px 10px",fontSize:12,background:viewMode==="table"?"#6366f1":"transparent",color:viewMode==="table"?"#fff":"#8899bb",borderRadius:0}}>⊞</button>
            <button className="btn" onClick={()=>setViewMode("card")} style={{padding:"5px 10px",fontSize:12,background:viewMode==="card"?"#6366f1":"transparent",color:viewMode==="card"?"#fff":"#8899bb",borderRadius:0}}>☰</button>
          </div>
          {/* ソート: 横スクロール1行 */}
          <div style={{display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",flex:1}}>
            {[["status","状態"],["priority","★"],["deadline","締切"],["name","名前"]].map(([k,l])=>(
              <button key={k} className={`chip${sort===k?" on":""}`} onClick={()=>setSort(k)} style={{fontSize:11,padding:"4px 9px",flexShrink:0}}>{l}</button>
            ))}
          </div>
        </>}
      </div>

      {subTab==="dl"&&<DeadlineList companies={companies} completedDLs={completedDLs} onToggle={onToggleDL}/>}

      {subTab==="list"&&(<>
        {/* ── Row 2: ステータスフィルター (横スクロール) ── */}
        <div style={{display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none",marginBottom:10,paddingBottom:2}}>
          <button className={`chip${filter==="すべて"?" on":""}`} onClick={()=>setFilter("すべて")} style={{flexShrink:0}}>全 {companies.length}</button>
          {STATUSES.filter(s=>counts[s]>0).map(s=>(
            <button key={s} className={`chip${filter===s?" on":""}`} onClick={()=>setFilter(s)} style={{flexShrink:0,...(filter===s?{fontWeight:700}:{color:SC[s]?.color,background:SC[s]?.bg,borderColor:SC[s]?.color+"44"})}}>{s} {counts[s]}</button>
          ))}
        </div>

        {/* TABLE VIEW */}
        {viewMode==="table"&&(
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #222630"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}}>
              <thead>
                <tr style={{background:"#1a2236",borderBottom:"1px solid #2a3347"}}>
                  {["会社名","ステータス","志望度","締め切り","次の予定","メモ",""].map((h,i)=>(
                    <th key={i} style={{padding:"8px 10px",color:"#8899bb",fontWeight:600,fontSize:11,textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c,i)=>{
                  const ec=ens(c);
                  const dl=fmt(ec.deadline),sc2=fmt(ec.schedule);
                  const dlCol=DL_COLORS[ec.deadlineType]||"#8899bb";
                  const isOpen=openDropId===c.id;
                  return(
                    <tr key={c.id} style={{borderBottom:"1px solid #2a3347",background:"#131929",cursor:"pointer"}}
                      onClick={()=>onDetail(c)}>
                      {/* 会社名 */}
                      <td style={{padding:"10px 12px",minWidth:110,maxWidth:150}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                            {ec.agency&&<span style={{fontSize:8,color:"#a5b4fc",background:"#1a3066",padding:"1px 4px",borderRadius:2,fontWeight:700,flexShrink:0}}>代</span>}
                            <span style={{fontWeight:600,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ec.name}</span>
                            {(ec.status==="不合格"||ec.status==="辞退")&&ec.rejectedAt&&(
                              <span style={{fontSize:9,color:ec.status==="不合格"?"#ef4444":"#8899bb",background:ec.status==="不合格"?"#450a0a":"#131929",padding:"1px 5px",borderRadius:3,fontWeight:700,flexShrink:0}}>{ec.rejectedAt}落ち</span>
                            )}
                          </div>
                          {(ec.mypageUrl||ec.mypageId||ec.mypagePw)&&(
                            <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                              {ec.mypageUrl&&<button className="btn mp-link" style={{fontSize:10,padding:"2px 7px"}} onClick={e=>{e.stopPropagation();window.open(ec.mypageUrl,"_blank");}}>🌐</button>}
                              {ec.mypageId&&<CBtn text={ec.mypageId} label="ID"/>}
                              {ec.mypagePw&&<CBtn text={ec.mypagePw} label="PW"/>}
                            </div>
                          )}
                        </div>
                      </td>
                      {/* ステータス */}
                      <td style={{padding:"6px 10px"}} onClick={e=>e.stopPropagation()}>
                        <div style={{position:"relative"}} onClick={e=>{e.stopPropagation();setOpenDropId(isOpen?null:c.id);}}>
                          <div style={{cursor:"pointer",fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:4,color:SC[ec.status]?.color,background:SC[ec.status]?.bg||"#1a2236",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
                            {ec.status}<span style={{fontSize:9,opacity:.7}}>▾</span>
                          </div>
                          {isOpen&&(
                            <div style={{position:"absolute",top:"calc(100% + 2px)",left:0,background:"#0a0e17",border:"1px solid #222630",borderRadius:8,zIndex:300,minWidth:130,maxHeight:220,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
                              {STATUSES.map(s=>(
                                <div key={s} style={{padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:600,color:SC[s]?.color,display:"flex",alignItems:"center",gap:6}}
                                  onClick={e=>{e.stopPropagation();onStatusChange(c.id,s);setOpenDropId(null);}}>
                                  <span style={{width:6,height:6,borderRadius:"50%",background:SC[s]?.color,flexShrink:0}}/>
                                  {s}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </td>
                      {/* 志望度 */}
                      <td style={{padding:"6px 10px"}} onClick={e=>e.stopPropagation()}>
                        <PriorityStars value={ec.priority||0} onChange={v=>onPriorityChange(c.id,v)} size={13}/>
                      </td>
                      {/* 締め切り */}
                      <td style={{padding:"6px 10px",minWidth:90,whiteSpace:"nowrap"}}>
                        {dl?(
                          <span style={{fontSize:11,color:dl.past?"#4a5568":dl.urgent?"#ef4444":dlCol}}>
                            <span style={{fontSize:9,fontWeight:700,padding:"1px 3px",borderRadius:2,background:dlCol+"22",color:dlCol,marginRight:3}}>{ec.deadlineType}</span>
                            {dl.str}
                          </span>
                        ):<span style={{color:"#4a5568"}}>—</span>}
                      </td>
                      {/* 次の予定 */}
                      <td style={{padding:"6px 10px",minWidth:90,whiteSpace:"nowrap"}}>
                        {sc2?(
                          <span style={{fontSize:11,color:sc2.past?"#4a5568":sc2.urgent?"#ef4444":"#a371f7"}}>
                            {ec.scheduleLabel?<span style={{fontSize:9,fontWeight:700,padding:"1px 3px",borderRadius:2,background:"#a371f722",color:"#a371f7",marginRight:3}}>{ec.scheduleLabel}</span>:null}
                            {sc2.str}
                          </span>
                        ):<span style={{color:"#4a5568"}}>—</span>}
                      </td>
                      {/* メモ */}
                      <td style={{padding:"6px 10px",maxWidth:120}}>
                        <span style={{fontSize:11,color:"#8899bb",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{ec.memo||"—"}</span>
                      </td>
                      {/* 削除 */}
                      <td style={{padding:"6px 8px"}} onClick={e=>e.stopPropagation()}>
                        <button className="btn" onClick={()=>onDel(c.id)} style={{color:"#8899bb",fontSize:13,padding:"2px 4px",background:"transparent"}}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {filtered.length===0&&<div style={{textAlign:"center",color:"#4b5563",padding:"32px 0",fontSize:12}}>該当なし</div>}
          </div>
        )}

        {/* CARD VIEW */}
        {viewMode==="card"&&(<>
          {filtered.map(c=>{
            const ec=ens(c);
            const dl=fmt(ec.deadline),sc2=fmt(ec.schedule);
            const dlCol=DL_COLORS[ec.deadlineType]||"#8899bb";
            const dlDone=completedDLs.includes(`${c.id}_${ec.deadlineLabel||""}`);
            return(
              <div key={c.id} className="card" onClick={()=>onDetail(c)}>
                {/* 会社名行 */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      {ec.agency&&<span style={{fontSize:10,color:"#a5b4fc",background:"#1a3066",padding:"2px 7px",borderRadius:5,fontWeight:700,flexShrink:0,letterSpacing:.3}}>代</span>}
                      {/* 会社名: 最重要情報 → 最大・最太 */}
                      <span style={{fontSize:17,fontWeight:800,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:-.2}}>{ec.name}</span>
                    </div>
                    {/* 落ちた選考ステージ */}
                    {(ec.status==="不合格"||ec.status==="辞退")&&ec.rejectedAt&&(
                      <span style={{fontSize:10,color:ec.status==="不合格"?"#ef4444":"#8899bb",background:ec.status==="不合格"?"#450a0a":"#1a2236",padding:"3px 9px",borderRadius:5,fontWeight:700,display:"inline-block"}}>{ec.rejectedAt}で{ec.status==="不合格"?"不合格":"辞退"}</span>
                    )}
                  </div>
                  <button className="btn" onClick={e=>{e.stopPropagation();onDel(c.id);}} style={{color:"#4a5568",fontSize:18,width:32,height:32,background:"transparent",flexShrink:0,borderRadius:8,minHeight:32}}>×</button>
                </div>

                {/* 締切 / 面接予定: 第2優先 → 目立つ色 */}
                {(dl||sc2)&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                    {dl&&(
                      dlDone ? null : <span style={{
                        fontSize:12,fontWeight:700,
                        color:dl.past?"#4a5568":dl.urgent?"#fff":"#fff",
                        background:dl.past?"#1a2236":dl.urgent?"#ef4444":"#f97316",
                        padding:"4px 10px",borderRadius:7,display:"flex",alignItems:"center",gap:4,
                        boxShadow:dl.urgent?"0 0 10px rgba(239,68,68,.4)":dl.past?"none":"0 0 8px rgba(249,115,22,.3)"
                      }}>
                        ⏰ {ec.deadlineType!=="その他"?ec.deadlineType+" ":""}{dl.str}
                        {dl.urgent&&<span style={{background:"rgba(255,255,255,.25)",padding:"1px 5px",borderRadius:4,fontSize:10}}>急</span>}
                      </span>
                    )}
                    {sc2&&(
                      <span style={{
                        fontSize:12,fontWeight:600,
                        color:sc2.past?"#4a5568":"#e0d7ff",
                        background:sc2.past?"#1a2236":"#2a1d5c",
                        padding:"4px 10px",borderRadius:7,display:"flex",alignItems:"center",gap:4
                      }}>
                        🗓 {ec.scheduleLabel?ec.scheduleLabel+" ":""}{sc2.str}
                      </span>
                    )}
                  </div>
                )}

                {/* ステータス + 志望度 */}
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                  <div onClick={e=>e.stopPropagation()}>
                    <StatusDrop value={ec.status} onChange={s=>onStatusChange(c.id,s)}/>
                  </div>
                  <div onClick={e=>e.stopPropagation()} style={{marginLeft:2}}>
                    <PriorityStars value={ec.priority||0} onChange={v=>onPriorityChange(c.id,v)} size={14}/>
                  </div>
                </div>
                {/* 次のアクション表示 */}
                {!dlDone&&(()=>{const act=getNextAction(ec);return act&&<div style={{
                  display:"flex",alignItems:"center",gap:5,
                  padding:"5px 8px",borderRadius:7,marginBottom:6,
                  background:act.urgent?"#1a0505":"#0a0e17",
                  border:`1px solid ${act.urgent?"#ef444433":"#1a2236"}`,
                }}>
                  <span style={{fontSize:12,flexShrink:0}}>{act.icon}</span>
                  <span style={{fontSize:11,color:act.urgent?"#fca5a5":act.color,
                    fontWeight:act.urgent?700:500,lineHeight:1.3}}>{act.text}</span>
                </div>;})()}
                {/* クイックアクセスバー: マイページ/ID/PW が登録されている時だけ表示 */}
                {(ec.mypageUrl||ec.mypageId||ec.mypagePw)&&(
                  <div style={{display:"flex",gap:6,paddingTop:8,borderTop:"1px solid #222d42"}} onClick={e=>e.stopPropagation()}>
                    {ec.mypageUrl&&(
                      <button className="btn" onClick={e=>{e.stopPropagation();window.open(ec.mypageUrl,"_blank");}}
                        style={{
                          flex:1,display:"flex",alignItems:"center",justifyContent:"center",
                          gap:5,padding:"8px",borderRadius:9,
                          background:"#172554",border:"1px solid #1e3a5f",
                          color:"#60a5fa",fontSize:12,fontWeight:700,minHeight:36,
                        }}>
                        🌐 マイページ
                      </button>
                    )}
                    {ec.mypageId&&(
                      <CopyPill text={ec.mypageId} label="ID" icon="👤"/>
                    )}
                    {ec.mypagePw&&(
                      <CopyPill text={ec.mypagePw} label="PW" icon="🔑" secret={true}/>
                    )}
                  </div>
                )}
              </div>
            );
          })}
          {filtered.length===0&&<div style={{textAlign:"center",color:"#4a5568",padding:"40px 0",fontSize:12}}>該当なし</div>}
        </>)}
      </>)}
    </div>
  );
}


// ── ES Bank ──────────────────────────────────────────
const ES_CATS=["自己PR","ガクチカ","志望動機","長所","短所","その他"];
function ESBank({esBank,onChange,onGoAI=()=>{}}){ /* fix: default prop */
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({title:"",category:"自己PR",content:""});
  const [filter,setFilter]=useState("すべて");

  const open=(e)=>{setEditing(e.id);setForm({title:e.title,category:e.category,content:e.content});};
  const openNew=()=>{setEditing("new");setForm({title:"",category:"自己PR",content:""}); };
  const save=()=>{
    if(!form.content.trim())return;
    if(editing==="new"){onChange([...esBank,{id:Date.now(),...form}]);}
    else{onChange(esBank.map(e=>e.id===editing?{...e,...form}:e));}
    setEditing(null);
  };
  const del=(id)=>{if(window.confirm("削除しますか？"))onChange(esBank.filter(e=>e.id!==id));};

  const filtered=filter==="すべて"?esBank:esBank.filter(e=>e.category===filter);

  if(editing!==null)return(
    <div>

// ── ReverseSection component (extracted from PrepTab IIFE to fix React hooks violation) ──
function ReverseSection({reverse,setReverse}){
  const [newQ,setNewQ]=useState("");
  const add=()=>{if(!newQ.trim())return;setReverse([...reverse,{id:Date.now(),q:newQ,used:false}]);setNewQ("");};
  const toggle=(id)=>setReverse(reverse.map(r=>r.id===id?{...r,used:!r.used}:r));
  const del=(id)=>setReverse(reverse.filter(r=>r.id!==id));
  return(
    <div>
      <div style={{fontSize:11,color:"#8899bb",marginBottom:12,letterSpacing:1}}>面接で使いたい逆質問をストックしておきましょう。使ったらチェックを入れると管理しやすいです。</div>

        <button className="btn" onClick={add} style={{background:"#22543d",color:"#fff",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,border:"1px solid #2ea043",flexShrink:0}}>追加</button>
      </div>

          <button className="btn" onClick={()=>toggle(r.id)} style={{width:20,height:20,borderRadius:4,border:`1.5px solid ${r.used?"#16a34a":"#4a5568"}`,background:r.used?"#22543d":"transparent",flexShrink:0,fontSize:11,color:"#fff",padding:0}}>
            {r.used?"✓":""}

        </div>
      ))}
    </div>
  );
}

// ── MotivationGraph: 自分史モチベーショングラフ ──
// 時代ごとのモチベーション(1-5)を折れ線グラフで可視化
// 縦軸:モチベーション 横軸:時代 点タップで詳細表示
// ── モチベーション年表 (年齢×1-100スケール版) ──
// データ: [{id, ageY, ageM, label, mot(1-100), note, createdAt}]
// X軸: 年齢(年+月), Y軸: 1-100

function MotivationGraph({events, onSelect, selected}) {
  if(!events||events.length<1) return null;

  const W=320, H=190, PAD={t:22,b:36,l:34,r:14};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;

  // X軸の範囲: データの最小・最大年齢から5歳単位に広げる
  const ages = events.map(ev=>ev.ageY+(ev.ageM||0)/12);
  const dataMin=Math.min(...ages), dataMax=Math.max(...ages);
  const xMin=Math.floor(dataMin/5)*5;
  const xMax=Math.ceil(dataMax/5)*5;
  const xRange=Math.max(xMax-xMin,5); // 最低5歳幅

  const toX = ageDecimal => PAD.l+((ageDecimal-xMin)/xRange)*iW;
  const toY = v => PAD.t+iH-((v-1)/99)*iH;

  // 5歳刻みの目盛り
  const xTicks=[];
  for(let y=xMin;y<=xMax;y+=5) xTicks.push(y);

  // Y軸目盛り
  const yTicks=[1,25,50,75,100];

  // データ点の座標
  const pts=events.map(ev=>({
    ...ev,
    x: toX(ev.ageY+(ev.ageM||0)/12),
    y: toY(ev.mot),
  }));

  const linePath=pts.length>1
    ? pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")
    : null;
  const areaPath=linePath
    ? `${linePath} L${pts[pts.length-1].x.toFixed(1)},${(PAD.t+iH).toFixed(1)} L${pts[0].x.toFixed(1)},${(PAD.t+iH).toFixed(1)} Z`
    : null;

  const motColor=v=>v>=75?"#4ade80":v>=50?"#f59e0b":v>=25?"#f97316":"#ef4444";

  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id="mg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6366f1" stopOpacity=".3"/>
          <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
        </linearGradient>
      </defs>

      {/* Y軸グリッド */}
      {yTicks.map(v=>{
        const y=toY(v);
        return(
          <g key={v}>
            <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y}
              stroke={v===50?"#2e3d5c":"#1a2236"}
              strokeWidth={v===50?"1.5":"1"}
              strokeDasharray={v===1||v===100?"0":"3,5"}/>
            <text x={PAD.l-4} y={y+3.5} textAnchor="end"
              fill={v===50?"#64748b":"#374151"} fontSize="9">{v}</text>
          </g>
        );
      })}

      {/* X軸ライン */}
      <line x1={PAD.l} y1={PAD.t+iH} x2={W-PAD.r} y2={PAD.t+iH}
        stroke="#2a3347" strokeWidth="1"/>

      {/* X軸: 5歳刻み等間隔グリッド + ラベル */}
      {xTicks.map(yr=>{
        const x=toX(yr);
        return(
          <g key={yr}>
            <line x1={x} y1={PAD.t} x2={x} y2={PAD.t+iH}
              stroke="#1a2236" strokeWidth="1" strokeDasharray="2,6"/>
            <line x1={x} y1={PAD.t+iH} x2={x} y2={PAD.t+iH+4}
              stroke="#2a3347" strokeWidth="1.5"/>
            <text x={x} y={PAD.t+iH+15} textAnchor="middle"
              fill="#64748b" fontSize="9" fontWeight="600">{yr}歳</text>
          </g>
        );
      })}

      {/* Y軸ライン */}
      <line x1={PAD.l} y1={PAD.t} x2={PAD.l} y2={PAD.t+iH}
        stroke="#2a3347" strokeWidth="1"/>

      {/* グラデーション塗りつぶし */}
      {areaPath&&<path d={areaPath} fill="url(#mg2)"/>}

      {/* 折れ線 */}
      {linePath&&<path d={linePath} fill="none" stroke="#6366f1"
        strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}

      {/* データ点 */}
      {pts.map(p=>{
        const col=motColor(p.mot);
        const isSel=selected===p.id;
        return(
          <g key={p.id} style={{cursor:"pointer"}}
            onClick={()=>onSelect&&onSelect(isSel?null:p.id)}>
            {/* タップ領域を広く */}
            <circle cx={p.x} cy={p.y} r="16" fill="transparent"/>
            {isSel&&<circle cx={p.x} cy={p.y} r="12" fill={col} fillOpacity=".15"/>}
            <circle cx={p.x} cy={p.y} r={isSel?7:5}
              fill={isSel?col:"#0a0e17"} stroke={col} strokeWidth="2.5"/>
            {/* スコア常時表示 */}
            <text x={p.x} y={p.y-(isSel?14:11)} textAnchor="middle"
              fill={col} fontSize={isSel?"11":"9"}
              fontWeight={isSel?"800":"600"}>{p.mot}</text>
          </g>
        );
      })}
    </svg>
  );
}

          style={{background:form.label.trim()?"#6366f1":"#1a2236",
            color:form.label.trim()?"#fff":"#4a5568",

    </div>
  );
}

function MotivationGraphEditor({motTimeline=[], onChange}) {
  const [selId, setSelId] = useState(null);
  const [mode, setMode] = useState(null); // null | "add" | "edit"
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ageY:18, ageM:0, label:"", mot:50, note:""});

  const motColor=v=>v>=75?"#4ade80":v>=50?"#f59e0b":v>=25?"#f97316":"#ef4444";

  const sorted=[...motTimeline].sort((a,b)=>
    (a.ageY*12+(a.ageM||0))-(b.ageY*12+(b.ageM||0))
  );

  const startAdd=()=>{
    setMode("add"); setSelId(null);
    setForm({ageY:18,ageM:0,label:"",mot:50,note:""});
  };
  const startEdit=ev=>{
    setMode("edit"); setEditId(ev.id); setSelId(null);
    setForm({ageY:ev.ageY,ageM:ev.ageM||0,label:ev.label,mot:ev.mot,note:ev.note||""});
  };
  const cancel=()=>{ setMode(null); setEditId(null); };

  const save=()=>{
    if(!form.label.trim()) return;
    if(mode==="add"){
      onChange([...motTimeline,{id:Date.now(),...form,createdAt:Date.now()}]);
    } else {
      onChange(motTimeline.map(ev=>ev.id===editId?{...ev,...form}:ev));
    }
    cancel();
  };

  const del=id=>{ onChange(motTimeline.filter(ev=>ev.id!==id)); setSelId(null); };
  const selEvent=sorted.find(e=>e.id===selId);

  return(
    <div style={{marginBottom:20}}>
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#f0f4ff"}}>モチベーション年表</div>
          <div style={{fontSize:11,color:"#8899bb",marginTop:1}}>
            {sorted.length}件 · 1〜100スケール · 年齢×月単位
          </div>
        </div>
        {!mode&&(
          <button className="btn" onClick={startAdd}
            style={{background:"#6366f1",color:"#fff",borderRadius:10,
              padding:"8px 18px",fontSize:13,fontWeight:700,
              boxShadow:"0 3px 12px rgba(99,102,241,.3)"}}>
            ＋ 追加
          </button>
        )}
      </div>

      {/* フォーム (add/edit) */}
      {mode&&(
        <MotTimelineForm
          form={form}
          setForm={setForm}
          onSave={save}
          onCancel={cancel}
          saveLabel={mode==="add"?"追加する":"保存する"}
        />
      )}

      {/* グラフ */}
      {!mode&&sorted.length>=2&&(
        <div style={{background:"#0a0e17",borderRadius:14,border:"1px solid #222d42",
          padding:"10px 8px 8px",marginBottom:10,overflow:"hidden"}}>
          <MotivationGraph
            events={sorted}
            onSelect={id=>{setSelId(selId===id?null:id);}}
            selected={selId}/>
          {selEvent&&(
            <div style={{padding:"10px 14px 14px",borderTop:"1px solid #1a2236",
              animation:"fadeUp .15s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
                    <span style={{fontSize:11,color:"#8899bb",fontFamily:"'Space Mono',monospace"}}>
                      {selEvent.ageY}歳{selEvent.ageM>0?selEvent.ageM+"ヶ月":""}
                    </span>
                    <span style={{fontFamily:"'Space Mono',monospace",fontSize:22,fontWeight:800,
                      color:motColor(selEvent.mot),lineHeight:1}}>{selEvent.mot}</span>
                    <span style={{fontSize:11,color:"#4a5568"}}>/100</span>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#f0f4ff",marginBottom:4}}>{selEvent.label}</div>
                  {selEvent.note&&<div style={{fontSize:12,color:"#94a3b8",lineHeight:1.65}}>{selEvent.note}</div>}
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  <button className="btn" onClick={()=>startEdit(selEvent)}
                    style={{background:"#1a2236",color:"#a5b4fc",borderRadius:8,
                      padding:"7px 12px",fontSize:12,fontWeight:600}}>編集</button>
                  <button className="btn" onClick={()=>del(selEvent.id)}
                    style={{background:"#2d1212",color:"#ef4444",borderRadius:8,
                      padding:"7px 12px",fontSize:12}}>削除</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* 0件・1件のガイド */}
      {!mode&&sorted.length===0&&(
        <div style={{textAlign:"center",padding:"32px 20px",background:"#0a0e17",
          borderRadius:14,border:"1px dashed #222d42",color:"#4a5568",fontSize:12}}>
          <div style={{fontSize:32,marginBottom:8}}>📈</div>
          ＋ 追加 で出来事を記録しましょう<br/>
          <span style={{fontSize:11,color:"#374151"}}>受験・部活・バイト・転機など何でもOK</span>
        </div>
      )}
      {!mode&&sorted.length===1&&(
        <div style={{padding:"10px 14px",background:"#0a0e17",borderRadius:10,
          border:"1px solid #222d42",color:"#4a5568",fontSize:11,marginBottom:8,textAlign:"center"}}>
          もう1件追加するとグラフが表示されます
        </div>
      )}

      {/* タイムラインリスト */}
      {!mode&&sorted.length>0&&(
        <div>
          <div style={{fontSize:10,color:"#4a5568",fontWeight:700,letterSpacing:1,marginBottom:8}}>タイムライン</div>
          {sorted.map(ev=>{
            const col=motColor(ev.mot);
            const isSel=selId===ev.id;
            return(
              <div key={ev.id}
                onClick={()=>setSelId(isSel?null:ev.id)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",
                  borderRadius:12,marginBottom:6,cursor:"pointer",
                  background:isSel?"#131929":"#0d1520",
                  border:`1px solid ${isSel?col+"66":"#1a2236"}`,
                  transition:"all .15s"}}>
                <div style={{textAlign:"center",flexShrink:0,minWidth:44}}>
                  <div style={{fontFamily:"'Space Mono',monospace",fontSize:14,fontWeight:800,
                    color:"#a5b4fc",lineHeight:1}}>
                    {ev.ageY}<span style={{fontSize:10,fontWeight:500}}>歳</span>
                  </div>
                  {ev.ageM>0&&<div style={{fontFamily:"'Space Mono',monospace",
                    fontSize:9,color:"#4a5568",marginTop:1}}>{ev.ageM}ヶ月</div>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#f0f4ff",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.label}</div>
                  {ev.note&&<div style={{fontSize:11,color:"#4a5568",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{ev.note}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                  <div style={{width:48,height:6,borderRadius:3,background:"#1a2236",overflow:"hidden"}}>
                    <div style={{width:`${ev.mot}%`,height:"100%",borderRadius:3,
                      background:`linear-gradient(90deg,#ef4444,#f59e0b,#4ade80)`}}/>
                  </div>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:12,
                    fontWeight:700,color:col,minWidth:24,textAlign:"right"}}>{ev.mot}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
