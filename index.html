function PrepTab({prep,onChange}){
  const [section,setSection]=useState("history");
  const p={history:{},willcan:{will:"",can:"",must:"",core:""},qa:[],reverse:[],motTimeline:[],...prep};

  const setHistory=(era,field,val)=>onChange({...p,history:{...p.history,[era]:{...p.history[era],[field]:val}}});
  const setWC=(field,val)=>onChange({...p,willcan:{...p.willcan,[field]:val}});
  const qaData=p.qa.length>0?p.qa:QA_DEFAULT;
  const setQa=(next)=>onChange({...p,qa:next});
  const setReverse=(next)=>onChange({...p,reverse:next});

  const SECS=[
    {key:"history", label:"📖 自分史"},
    {key:"analysis",label:"🌳 自己分析"},
    {key:"qa",      label:"💬 Q&A"},
    {key:"reverse", label:"🔄 逆質問"},
  ];

  return(
    <div>
      {/* Section tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",scrollbarWidth:"none"}}>
        {SECS.map(s=>(
          <button key={s.key} className={`chip${section===s.key?" on":""}`} onClick={()=>setSection(s.key)} style={{flexShrink:0,padding:"5px 12px",fontSize:12}}>{s.label}</button>
        ))}
      </div>

      {/* 自分史 */}
      {section==="history"&&(
        <div>
          <div style={{fontSize:11,color:"#8899bb",marginBottom:12,letterSpacing:1}}>時期ごとの出来事・感情・気づきを記録。面接のエピソードの引き出しになります。</div>
          {/* モチベーショングラフ: 全時代一覧 */}
          {/* モチベーション年表エディタ: prep.motTimeline に保存 */}
          <MotivationGraphEditor
            motTimeline={p.motTimeline||[]}
            onChange={timeline=>onChange({...p,motTimeline:timeline})}
          />
          {ERAS.map(({key,label})=>{
            const h=p.history[key]||{};
            const mot=parseInt(h.motivation||3);
            return(
              <div key={key} style={{background:"#131929",border:"1px solid #222630",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#f0f4ff"}}>{label}</span>
                  <div style={{display:"flex",gap:4}}>
                    {MOT_LEVELS.map((e,i)=>(
                      <button key={i} className="btn" onClick={()=>setHistory(key,"motivation",i+1)}
                        style={{fontSize:16,padding:"2px",opacity:mot===i+1?1:0.3,background:"transparent"}}>{e}</button>
                    ))}
                  </div>
                </div>
                {[
                  {field:"event",   label:"📌 出来事・経験", ph:"何があったか・頑張ったこと・所属など"},
                  {field:"emotion", label:"💭 感情・気づき", ph:"楽しかった・つらかった・学んだこと"},
                  {field:"skill",   label:"💡 得たもの",     ph:"身についたスキル・価値観・強み"},
                ].map(({field,label,ph})=>(
                  <div key={field} style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:"#8899bb",marginBottom:3,fontWeight:600}}>{label}</div>
                    <textarea className="ifield" placeholder={ph} value={h[field]||""} onChange={e=>setHistory(key,field,e.target.value)} style={{minHeight:56,fontSize:12,background:"#1a2236",border:"1px solid #222630"}}/>
                  </div>
                ))}
                {/* タグ付け: エピソード逆引きで使われる */}
                {(h.event||h.emotion||h.skill)&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #222d42"}}>
                    <div style={{fontSize:10,color:"#8899bb",fontWeight:700,marginBottom:8,letterSpacing:.5}}>
                      🏷 このエピソードのタグ <span style={{color:"#8899bb",fontWeight:400,fontSize:9}}>(複数選択可・エピソード逆引きで使います)</span>
                    </div>
                    <TagSelector selected={h.tags||[]} onChange={tags=>setHistory(key,"tags",tags)} compact={true}/>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* 自己分析 Will/Can/Must */}
      {section==="analysis"&&(
        <div>
          <div style={{fontSize:11,color:"#8899bb",marginBottom:14,letterSpacing:1}}>Will/Can/Mustの重なりがキャリアの軸になります。強みの根拠は自分史から引っ張ってきましょう。</div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:700,color:"#22c55e"}}>🌳 強みの木</div>
              <button className="btn" onClick={()=>{
                const trees=p.willcan.trees||[];
                setWC("trees",[...trees,{id:Date.now(),title:"",episodes:"",actions:"",skills:"",values:"",weakness:""}]);
              }} style={{background:"#0d2b12",color:"#22c55e",borderRadius:5,padding:"3px 10px",fontSize:11,fontWeight:600,border:"1px solid #23863644"}}>＋ 追加</button>
            </div>
            <div style={{fontSize:11,color:"#8899bb",marginBottom:10}}>エピソードごとに強みの構造を整理できます</div>
            {(p.willcan.trees||[]).map((tree,ti)=>(
              <div key={tree.id} style={{background:"#1a2236",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #23863633"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <input className="ifield" placeholder={`エピソード名（例：マーチングバンド部長）`} value={tree.title} onChange={e=>{
                    const t=[...(p.willcan.trees||[])];t[ti]={...t[ti],title:e.target.value};setWC("trees",t);
                  }} style={{fontSize:12,background:"#131929",flex:1,marginRight:8}}/>

                    const t=[...(p.willcan.trees||[])];t.splice(ti,1);setWC("trees",t);

                </div>
                {[
                  {field:"episodes",label:"📖 エピソード・実績",color:"#8899bb",ph:"何をしたか・どんな経験か"},
                  {field:"actions", label:"⚡ そのときの行動",  color:"#f97316",ph:"具体的に何をしたか"},
                  {field:"skills",  label:"🛠 使ったスキル",    color:"#58a6ff",ph:"課題解決力・巻き込み力など"},
                  {field:"values",  label:"🌱 根っこの価値観",  color:"#22c55e",ph:"非効率をなくしたい・仲間を巻き込みたいなど"},
                  {field:"weakness",label:"📉 弱み・改善策",    color:"#ef4444",ph:"短所と、それに対してどう向き合っているか"},
                ].map(({field,label,color,ph})=>(
                  <div key={field} style={{marginBottom:8}}>
                    <div style={{fontSize:10,color,fontWeight:700,marginBottom:3}}>{label}</div>
                    <textarea className="ifield" placeholder={ph} value={tree[field]||""} onChange={e=>{
                      const t=[...(p.willcan.trees||[])];t[ti]={...t[ti],[field]:e.target.value};setWC("trees",t);
                    }} style={{minHeight:48,fontSize:12,background:"#131929",border:`1px solid ${color}22`}}/>
                  </div>
                ))}
                {/* タグ付け */}
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #222d42"}}>
                  <div style={{fontSize:10,color:"#8899bb",fontWeight:700,marginBottom:8,letterSpacing:.5}}>
                    🏷 タグ <span style={{color:"#8899bb",fontWeight:400,fontSize:9}}>(複数選択可)</span>
                  </div>
                  <TagSelector
                    selected={tree.tags||[]}
                    onChange={tags=>{const t=[...(p.willcan.trees||[])];t[ti]={...t[ti],tags};setWC("trees",t);}}
                    compact={true}
                  />
                </div>
              </div>
            ))}
            {(p.willcan.trees||[]).length===0&&(
              <div style={{textAlign:"center",color:"#8899bb",padding:"16px 0",fontSize:12}}>＋ 追加ボタンでエピソードを登録できます</div>
            )}
          </div>
        </div>
      )}

      {/* Q&A - fix: extracted from IIFE to proper component to fix React hooks violation */}
      {section==="qa"&&<QASection qaData={qaData} setQa={setQa}/>}

      {/* 逆質問 - fix: extracted from IIFE to proper component to fix React hooks violation */}
      {section==="reverse"&&<ReverseSection reverse={p.reverse||[]} setReverse={setReverse}/>}
    </div>
  );
}

function OBVisits({visits,onChange}){
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({company:"",person:"",date:"",questions:"",notes:""});

  const openNew=()=>{setEditing("new");setForm({company:"",person:"",date:new Date().toISOString().slice(0,10),questions:"",notes:""}); };
  const open=(v)=>{setEditing(v.id);setForm({company:v.company,person:v.person,date:v.date,questions:v.questions,notes:v.notes});};
  const save=()=>{
    if(!form.company.trim())return;
    if(editing==="new")onChange([...visits,{id:Date.now(),...form}]);
    else onChange(visits.map(v=>v.id===editing?{...v,...form}:v));
    setEditing(null);
  };
  const del=(id)=>{if(window.confirm("削除しますか？"))onChange(visits.filter(v=>v.id!==id));};

  if(editing!==null)return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
        <span style={{fontSize:14,fontWeight:700,color:"#f0f4ff"}}>OB訪問 {editing==="new"?"追加":"編集"}</span>
        <button className="btn" onClick={()=>setEditing(null)} style={{background:"#1a2236",color:"#8899bb",borderRadius:6,padding:"5px 10px",fontSize:12}}>← 戻る</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[
          {key:"company",  label:"会社名",    ph:"例：日立システムズ",   type:"input"},
          {key:"person",   label:"相手（役職）",ph:"例：SE 3年目 田中さん",type:"input"},
          {key:"date",     label:"日付",       ph:"",                    type:"date"},
          {key:"questions",label:"聞いたこと", ph:"事前に用意した質問・実際に聞いたこと",type:"textarea"},
          {key:"notes",    label:"気づき・メモ",ph:"印象・有益だった情報・次のアクションなど",type:"textarea"},
        ].map(({key,label,ph,type})=>(
          <div key={key}>
            <div style={{fontSize:11,color:"#8899bb",marginBottom:4,fontWeight:600}}>{label}</div>
            {type==="textarea"
              ?<textarea className="ifield" placeholder={ph} value={form[key]} onChange={e=>setForm(x=>({...x,[key]:e.target.value}))} style={{minHeight:80,fontSize:12}}/>
              :<input className="ifield" type={type==="date"?"date":"text"} placeholder={ph} value={form[key]} onChange={e=>setForm(x=>({...x,[key]:e.target.value}))} style={{colorScheme:"dark",fontSize:13}}/>
            }
          </div>
        ))}
      </div>
      <button className="btn" onClick={save} style={{width:"100%",marginTop:14,background:"#6366f1",color:"#fff",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700}}>保存する</button>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:10,color:"#8899bb",letterSpacing:2,fontWeight:600}}>OB訪問記録 · {visits.length}件</div>
        <button className="btn" onClick={openNew} style={{background:"#6366f1",color:"#fff",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600}}>＋ 追加</button>
      </div>
      {visits.length===0&&<div style={{textAlign:"center",color:"#8899bb",padding:"40px 0",fontSize:13}}>OB訪問の記録がありません</div>}
      {[...visits].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(v=>(
        <div key={v.id} style={{background:"#131929",border:"1px solid #222630",borderRadius:8,padding:"12px",marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#f0f4ff",marginBottom:3}}>{v.company}</div>
              <div style={{display:"flex",gap:8}}>
                <span style={{fontSize:11,color:"#8899bb"}}>{v.person}</span>
                <span style={{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#8899bb"}}>{v.date}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:5}}>
              <button className="btn" onClick={()=>open(v)} style={{background:"#1f3550",color:"#58a6ff",borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:600,border:"1px solid #1f6feb44"}}>編集</button>
              <button className="btn" onClick={()=>del(v.id)} style={{color:"#8899bb",fontSize:12,background:"transparent",padding:"3px 5px"}}>✕</button>
            </div>

        </div>
      ))}
    </div>
  );
}



// ── SVG Donut Chart ──────────────────────────────────
function DonutChart({slices,size=140}){
  const total=slices.reduce((s,d)=>s+d.v,0);
  if(total===0)return<div style={{color:"#8899bb",fontSize:12,padding:"20px 0",textAlign:"center"}}>データなし</div>;
  let cum=0;
  const cx=size/2,cy=size/2,r=size*0.38,sw=size*0.16;
  const segs=slices.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total;
    const a0=cum*2*Math.PI-Math.PI/2;
    cum+=pct;
    const a1=cum*2*Math.PI-Math.PI/2;
    const la=pct>0.5?1:0;
    const x1=cx+r*Math.cos(a0),y1=cy+r*Math.sin(a0);
    const x2=cx+r*Math.cos(a1),y2=cy+r*Math.sin(a1);
    return{...d,path:`M${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${la} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`,pct};
  });
  return(
    <svg width={size} height={size} style={{overflow:"visible"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#222d42" strokeWidth={sw}/>
      {segs.map((s,i)=>(
        <path key={i} d={s.path} fill="none" stroke={s.color} strokeWidth={sw-1} strokeLinecap="butt"/>
      ))}
      <text x={cx} y={cy-6} textAnchor="middle" fill="#f0f4ff" fontSize={size*0.16} fontWeight="700" fontFamily="Space Mono,monospace">{total}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#8899bb" fontSize={size*0.09}>社</text>
    </svg>
  );
}

// ── Analytics Tab ────────────────────────────────────
function AnalyticsTab({companies}){
  const now=new Date();
  const counts=STATUSES.reduce((a,s)=>{a[s]=companies.filter(c=>c.status===s).length;return a;},{});
  // ── 通過率ファネル: historyとrejectedAtを使った正確な計算 ──
  // 各ステージに「到達したことがある」企業数をカウント
  const STAGES_IKJO = ["書類待ち","書類結果待ち","ES","テスト","テスト結果待ち","GD","GD結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_PASSED_ESSAY = ["テスト","テスト結果待ち","GD","GD結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_IKJO_1 = ["GD","GD結果待ち","テスト","テスト結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_IKJO_FINAL = ["最終","最終結果待ち","内定"];

  // 企業が「そのステージに到達したか」を判定
  // 現在ステータス OR historyにそのステージがある OR (不合格/辞退 && rejectedAtがそのステージ以上)
  const reachedStage = (c, stageList) => {
    if(stageList.includes(c.status)) return true;
    if((c.status==="不合格"||c.status==="辞退") && c.rejectedAt && stageList.includes(c.rejectedAt)) return true;
    if((c.history||[]).some(h=>stageList.includes(h.stage))) return true;
    return false;
  };

  const applied = companies.filter(c=>c.status!=="未着手");
  const stages=[
    {label:"応募総数",   n:applied.length, color:"#8899bb"},
    {label:"書類通過",   n:applied.filter(c=>reachedStage(c, S_PASSED_ESSAY)).length, color:"#58a6ff"},
    {label:"1次以上",    n:applied.filter(c=>reachedStage(c, S_IKJO_1)).length, color:"#a371f7"},
    {label:"最終以上",   n:applied.filter(c=>reachedStage(c, S_IKJO_FINAL)).length, color:"#f97316"},
    {label:"内定",       n:counts["内定"]||0, color:"#22c55e"},
  ];
  const groups=[
    {label:"内定",v:counts["内定"]||0,color:"#22c55e"},
    {label:"最終〜2次",v:["最終","最終結果待ち","4次","4次結果待ち","3次","3次結果待ち","2次","2次結果待ち"].reduce((s,k)=>s+(counts[k]||0),0),color:"#a371f7"},
    {label:"1次・GD",v:["1次","1次結果待ち","GD","GD結果待ち","テスト","テスト結果待ち","面談"].reduce((s,k)=>s+(counts[k]||0),0),color:"#22d3ee"},
    {label:"書類",v:(counts["書類待ち"]||0)+(counts["書類結果待ち"]||0),color:"#8899bb"},
    {label:"未着手",v:counts["未着手"]||0,color:"#4a5568"},
    {label:"不合格",v:(counts["不合格"]||0)+(counts["辞退"]||0),color:"#ef4444"},
  ];
  const upcoming7=[];
  companies.forEach(c=>{
    [{dt:c.deadline,label:c.deadlineType||"締切",type:"dl"},{dt:c.schedule,label:c.scheduleLabel||"予定",type:"sc"}].forEach(({dt,label,type})=>{
      if(!dt)return;
      const d=new Date(dt),diff=(d-now)/864e5;
      if(diff>=0&&diff<=7)upcoming7.push({name:c.name,dt:d,diff,label,type,status:c.status});
    });
  });
  upcoming7.sort((a,b)=>a.dt-b.dt);
  const rate=(a,b)=>b===0?"—":(a/b*100).toFixed(0)+"%";
  return(
    <div>
      <div style={{fontSize:10,color:"#8899bb",marginBottom:14,letterSpacing:2,fontWeight:600}}>📊 選考分析</div>
      {/* 勝率分析 */}
      <WinRateAnalysis companies={companies}/>
      <div style={{background:"#131929",border:"1px solid #222630",borderRadius:10,padding:"14px",marginBottom:12,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
        <DonutChart slices={groups} size={120}/>
        <div style={{flex:1,minWidth:140}}>
          {groups.filter(g=>g.v>0).map((g,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:g.color,flexShrink:0}}/>
              <span style={{fontSize:12,color:"#c8d8f0",flex:1}}>{g.label}</span>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,color:g.color}}>{g.v}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:"#131929",border:"1px solid #222630",borderRadius:10,padding:"14px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#f0f4ff",marginBottom:12}}>📈 通過率ファネル</div>
        {stages.map((s,i)=>{
          const pct=stages[0].n===0?0:(s.n/stages[0].n);
          const prev=i===0?null:stages[i-1];
          return(
            <div key={i} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:11,color:"#c8d8f0"}}>{s.label}</span>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  {prev&&<span style={{fontSize:10,color:s.color,fontWeight:600}}>前段階比 {rate(s.n,prev.n)}</span>}
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:16,fontWeight:700,color:s.color}}>{s.n}</span>
                </div>
              </div>
              <div style={{background:"#1a2236",borderRadius:4,height:6,overflow:"hidden"}}>
                <div style={{background:s.color,height:"100%",width:`${pct*100}%`,borderRadius:4}}/>
              </div>
            </div>
          );
        })}
        <div style={{marginTop:10,padding:"8px 10px",background:"#1a2236",borderRadius:6,display:"flex",gap:16,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"#8899bb"}}>書類通過率: <span style={{color:"#58a6ff",fontWeight:700}}>{rate(stages[1].n,stages[0].n)}</span></span>
          <span style={{fontSize:11,color:"#8899bb"}}>1次通過率: <span style={{color:"#a371f7",fontWeight:700}}>{rate(stages[2].n,stages[1].n)}</span></span>
          <span style={{fontSize:11,color:"#8899bb"}}>最終通過率: <span style={{color:"#f97316",fontWeight:700}}>{rate(stages[3].n,stages[2].n)}</span></span>
          <span style={{fontSize:11,color:"#8899bb"}}>内定率: <span style={{color:"#22c55e",fontWeight:700}}>{rate(stages[4].n,stages[0].n)}</span></span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {label:"エージェント経由",n:companies.filter(c=>c.agency).length,color:"#93c5fd"},
          {label:"直接応募",n:companies.filter(c=>!c.agency).length,color:"#58a6ff"},
          {label:"進行中",n:companies.filter(c=>!["辞退","不合格"].includes(c.status)).length,color:"#22c55e"},
          {label:"終了",n:(counts["辞退"]||0)+(counts["不合格"]||0),color:"#ef4444"},
        ].map((s,i)=>(
          <div key={i} style={{background:"#131929",border:"1px solid #222630",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:24,fontWeight:700,color:s.color}}>{s.n}</div>
            <div style={{fontSize:10,color:"#8899bb",marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#131929",border:"1px solid #222630",borderRadius:10,padding:"14px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#f0f4ff",marginBottom:10}}>📅 直近7日間の予定</div>
        {upcoming7.length===0?<div style={{color:"#8899bb",fontSize:12,textAlign:"center",padding:"12px 0"}}>予定なし</div>:
          upcoming7.map((e,i)=>{
            const mm=e.dt.getMonth()+1,dd=e.dt.getDate(),hh=e.dt.getHours(),mn=String(e.dt.getMinutes()).padStart(2,"0");
            const isU=e.diff<1;
            return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,padding:"7px 10px",background:"#1a2236",borderRadius:6,border:`1px solid ${isU?"#f8514944":"#222d42"}`}}>
                <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,color:isU?"#ef4444":"#8899bb",minWidth:50}}>
                  <div>{mm}/{dd}</div><div>{hh}:{mn}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#f0f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}</div>
                  <div style={{fontSize:10,color:e.type==="dl"?"#f97316":"#a371f7"}}>{e.label} · あと{Math.ceil(e.diff)}日</div>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:SC[e.status]?.color,flexShrink:0}}>{e.status}</span>
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

// ── 勝率分析コンポーネント ──────────────────────────────
function WinRateAnalysis({companies}) {
  const now = new Date();
  if(!companies||companies.length===0) return(
    <div style={{textAlign:"center",color:"#4a5568",padding:"20px 0",fontSize:12}}>企業データを追加すると分析が表示されます</div>
  );

  // 選考フェーズ定義 - historyとrejectedAtを使った正確な計算
  // 「その段階に到達した」= 現在ステータス OR historyに記録 OR rejectedAtがその段階以上
  const hasReached = (c, stages) => {
    if(stages.includes(c.status)) return true;
    if((c.status==="不合格"||c.status==="辞退") && c.rejectedAt && stages.includes(c.rejectedAt)) return true;
    if((c.history||[]).some(h=>stages.includes(h.stage))) return true;
    return false;
  };
  const S_ESSAY_PASS  = ["テスト","テスト結果待ち","GD","GD結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_TEST_GD     = ["GD","GD結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_INT1_PASS   = ["2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_FINAL       = ["最終","最終結果待ち","内定"];
  const S_FINAL_PASS  = ["内定"];

  const applied_all = companies.filter(c=>c.status!=="未着手");
  // フェーズごとの「受験した全企業」= そのフェーズに到達したことがある企業
  // = 現在ステータスがそこ以上 OR historyに記録あり OR rejectedAtがそのフェーズ
  const S_REACHED_TEST = ["テスト","テスト結果待ち","GD","GD結果待ち","面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_FAILED_TEST  = ["テスト","GD","動画面接"];
  const S_REACHED_1    = ["面談","1次","1次結果待ち","2次","2次結果待ち","3次","3次結果待ち","4次","4次結果待ち","最終","最終結果待ち","内定"];
  const S_FAILED_1     = ["1次","面談"];

  const phases = [
    {
      label:"ES・書類",
      icon:"📄",
      color:"#60a5fa",
      // 応募した全社が受験対象
      applied: applied_all.length,
      // テスト/GD/1次以上に進んだ = 書類通過
      passed:  applied_all.filter(c=>hasReached(c, S_ESSAY_PASS)).length,
      failed:  applied_all.filter(c=>(c.status==="不合格"||c.status==="辞退")&&c.rejectedAt&&["書類","ES"].includes(c.rejectedAt)).length,
    },
    {
      label:"テスト・GD",
      icon:"📝",
      color:"#f59e0b",
      // テスト/GD/1次以上に到達した企業が受験対象
      applied: applied_all.filter(c=>hasReached(c, S_REACHED_TEST) || ((c.status==="不合格"||c.status==="辞退")&&S_FAILED_TEST.includes(c.rejectedAt))).length,
      // 1次以上に進んだ = テスト/GD通過
      passed:  applied_all.filter(c=>hasReached(c, S_TEST_GD)).length,
      failed:  applied_all.filter(c=>(c.status==="不合格"||c.status==="辞退")&&c.rejectedAt&&S_FAILED_TEST.includes(c.rejectedAt)).length,
    },
    {
      label:"1次面接",
      icon:"🗣",
      color:"#a78bfa",
      // 1次/面談以上に到達した企業が受験対象
      applied: applied_all.filter(c=>hasReached(c, S_REACHED_1) || ((c.status==="不合格"||c.status==="辞退")&&S_FAILED_1.includes(c.rejectedAt))).length,
      // 2次以上に進んだ = 1次通過
      passed:  applied_all.filter(c=>hasReached(c, S_INT1_PASS)).length,
      failed:  applied_all.filter(c=>(c.status==="不合格"||c.status==="辞退")&&c.rejectedAt&&S_FAILED_1.includes(c.rejectedAt)).length,
    },
    {
      label:"最終面接",
      icon:"🏆",
      color:"#4ade80",
      // 最終以上に到達した企業が受験対象
      applied: applied_all.filter(c=>hasReached(c, S_FINAL) || ((c.status==="不合格"||c.status==="辞退")&&c.rejectedAt==="最終")).length,
      // 内定 = 最終通過
      passed:  applied_all.filter(c=>c.status==="内定").length,
      failed:  applied_all.filter(c=>(c.status==="不合格"||c.status==="辞退")&&c.rejectedAt==="最終").length,
    },
  ];

  const rate = (p,a) => a===0 ? null : Math.round(p/a*100);
  const total = companies.filter(c=>c.status!=="未着手").length;
  const offers = companies.filter(c=>c.status==="内定").length;
  const rejected = companies.filter(c=>c.status==="不合格").length;
  const ongoing = companies.filter(c=>!["未着手","不合格","辞退","内定"].includes(c.status)).length;

  // 改善ポイント自動生成
  const tips = [];
  const esRate = rate(phases[0].passed, phases[0].applied);
  const int1Rate = rate(phases[2].passed, phases[2].applied);
  const finalRate = rate(phases[3].passed, phases[3].applied);
  if(esRate!==null && esRate<50) tips.push({icon:"📄",color:"#60a5fa",text:`書類通過率${esRate}% → ES・志望動機の見直しが効果的`});
  if(int1Rate!==null && int1Rate<50) tips.push({icon:"🗣",color:"#a78bfa",text:`1次通過率${int1Rate}% → 自己PR・ガクチカの練習を増やそう`});
  if(finalRate!==null && finalRate<60) tips.push({icon:"🏆",color:"#4ade80",text:`最終通過率${finalRate}% → 志望動機の深掘りと企業研究を強化`});
  if(tips.length===0 && total>0) tips.push({icon:"✨",color:"#22c55e",text:"今のところ順調！この調子で継続しよう"});

  return(
    <div style={{marginBottom:16}}>
      {/* サマリー */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
        {[
          {l:"応募",n:total,c:"#8899bb"},
          {l:"進行中",n:ongoing,c:"#60a5fa"},
          {l:"内定",n:offers,c:"#4ade80"},
          {l:"不合格",n:rejected,c:"#ef4444"},
        ].map(s=>(
          <div key={s.l} style={{background:"#0a0e17",borderRadius:10,padding:"8px 4px",
            textAlign:"center",border:`1px solid ${s.c}22`}}>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:18,fontWeight:800,
              color:s.c,lineHeight:1}}>{s.n}</div>
            <div style={{fontSize:10,color:"#4a5568",marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* フェーズ別通過率 */}
      <div style={{background:"#0a0e17",borderRadius:14,border:"1px solid #222d42",
        padding:"14px",marginBottom:10}}>
        <div style={{fontSize:11,color:"#8899bb",fontWeight:700,letterSpacing:1,marginBottom:12}}>
          フェーズ別 通過率
        </div>
        {phases.map((ph,i)=>{
          const r = rate(ph.passed, ph.applied);
          return(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",
                alignItems:"center",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>{ph.icon}</span>
                  <span style={{fontSize:12,color:"#c8d8f0",fontWeight:600}}>{ph.label}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:10,color:"#4a5568"}}>
                    {ph.passed}/{ph.applied}社
                  </span>
                  <span style={{fontFamily:"'Space Mono',monospace",fontSize:15,
                    fontWeight:800,color:r===null?"#4a5568":r>=60?ph.color:"#f97316"}}>
                    {r===null?"—":r+"%"}
                  </span>
                </div>
              </div>
              <div style={{height:7,background:"#1a2236",borderRadius:4,overflow:"hidden"}}>
                <div style={{
                  width:`${r||0}%`,height:"100%",borderRadius:4,
                  background:`linear-gradient(90deg,${ph.color}88,${ph.color})`,
                  transition:"width .6s ease"
                }}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* 改善ポイント */}
      {tips.length>0&&(
        <div style={{background:"#0a0e17",borderRadius:14,border:"1px solid #222d42",padding:"14px"}}>
          <div style={{fontSize:11,color:"#8899bb",fontWeight:700,letterSpacing:1,marginBottom:10}}>
            💡 改善ポイント
          </div>
          {tips.map((t,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",
              padding:"8px 10px",borderRadius:8,marginBottom:6,
              background:"#131929",border:`1px solid ${t.color}22`}}>
              <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
              <span style={{fontSize:12,color:"#c8d8f0",lineHeight:1.6}}>{t.text}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const EP_TAG_COLORS = {
  "リーダーシップ": "#a78bfa",

  "チームワーク":   "#34d399",
  "課題解決":       "#60a5fa",

  "社会貢献":       "#4ade80",
};
function TagSelector({selected=[], onChange, compact=false}) {
  const toggle = t => {
    if (selected.includes(t)) onChange(selected.filter(x => x !== t));
    else onChange([...selected, t]);
  };
  return (
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {EP_TAGS.map(t => {
        const on = selected.includes(t);
        const col = EP_TAG_COLORS[t] || "#8899bb";
        return (
          <button key={t} className="btn" onClick={() => toggle(t)} style={{
            fontSize: compact ? 10 : 11,
            padding: compact ? "3px 8px" : "4px 10px",
            borderRadius: 99,
            border: `1.5px solid ${on ? col : col+"44"}`,

            fontWeight: on ? 700 : 500,
            transition: "all .15s",
            flexShrink: 0,
          }}>{t}</button>

// ── Episode Finder ───────────────────────────────────
const EP_TAGS=["リーダーシップ","挫折・失敗","チームワーク","課題解決","継続・努力","創意工夫","数字・実績","コミュニケーション","自己成長","社会貢献"];
const EP_KW={"リーダーシップ":["部長","リーダー","まとめ","引っ張","指揮","まとめ"],"挫折・失敗":["失敗","挫折","つらい","困難","苦労"],"チームワーク":["チーム","協力","仲間","部員","連携"],"課題解決":["課題","解決","改善","問題","システム","効率","データ"],"継続・努力":["続け","努力","毎日","練習","コツコツ"],"創意工夫":["工夫","アイデア","考え","発案","提案"],"数字・実績":["万","%","倍","削減","向上","達成","金賞","優勝","0."],"コミュニケーション":["伝え","話し","聞き","相談","説明","対話"],"自己成長":["成長","学び","気づき","変化"],"社会貢献":["社会","貢献","地域","インフラ","支える"]};

function EpisodeFinder({prep}){
  const [filterTags,setFilterTags]=useState([]);  // 検索用タグ（複数選択可）
  const history=(prep&&prep.history)||{};
  const toggleFilter=t=>setFilterTags(ts=>ts.includes(t)?ts.filter(x=>x!==t):[...ts,t]);

  // 全エピソードを収集（タグ情報付き）
  const ERAS={"childhood":"幼少期〜小学生","middle":"中学生","high":"高校生","uni1":"大学前半","uni2":"大学後半"};
  const allEps=[];
  Object.entries(ERAS).forEach(([key,label])=>{
    const h=history[key]||{};
    if(h.event||h.emotion||h.skill){
      allEps.push({
        id:key, era:label,
        event:h.event||"", emotion:h.emotion||"", skill:h.skill||"",
        motivation:h.motivation||3,
        tags:h.tags||[],  // 手動タグ
        source:"history",
      });
    }
  });
  const trees=(prep&&prep.willcan&&prep.willcan.trees)||[];
  trees.forEach((t,i)=>{
    if(t.title||t.episodes){
      allEps.push({
        id:"tree_"+i, era:t.title||"エピソード",
        event:t.episodes||"", emotion:t.actions||"", skill:t.skills||"",
        motivation:3,
        tags:t.tags||[],  // 手動タグ
        source:"tree",
      });
    }
  });

  // フィルタリング: 手動タグ優先 → キーワードフォールバック
  const matched = filterTags.length===0 ? allEps : allEps.filter(ep => {
    // 手動タグが設定されていればそちらで判定（正確）
    if(ep.tags.length > 0){
      return filterTags.some(ft => ep.tags.includes(ft));
    }
    // タグ未設定ならキーワードで判定（フォールバック）
    const text=(ep.event+ep.emotion+ep.skill).toLowerCase();
    return filterTags.some(tag=>(EP_KW[tag]||[]).some(kw=>text.includes(kw)));
  });

  // 選択済みタグごとにエピソード数を集計
  const tagCounts = EP_TAGS.reduce((acc,t)=>{
    acc[t]=allEps.filter(ep=>{
      if(ep.tags.includes(t))return true;
      const text=(ep.event+ep.emotion+ep.skill).toLowerCase();
      return (EP_KW[t]||[]).some(kw=>text.includes(kw));
    }).length;
    return acc;
  },{});

  return(
    <div>
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#f0f4ff",marginBottom:2}}>エピソード逆引き</div>
          <div style={{fontSize:11,color:"#8899bb"}}>タグを複数選択して絞り込み · {allEps.length}件登録</div>
        </div>
        {filterTags.length>0&&(
          <button className="btn" onClick={()=>setFilterTags([])} style={{fontSize:11,color:"#8899bb",background:"#1a2236",borderRadius:7,padding:"4px 10px"}}>
            クリア
          </button>
        )}
      </div>

      {/* タグ選択: 件数バッジ付き */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {EP_TAGS.map(t=>{
          const on=filterTags.includes(t);
          const col=EP_TAG_COLORS[t]||"#8899bb";
          const cnt=tagCounts[t]||0;
          return(
            <button key={t} className="btn" onClick={()=>toggleFilter(t)} style={{
              fontSize:12,padding:"6px 12px",borderRadius:99,
              border:`1.5px solid ${on?col:col+"44"}`,
              background:on?col+"22":"transparent",
              color:on?col:"#8899bb",
              fontWeight:on?700:500,
              transition:"all .15s",
              display:"flex",alignItems:"center",gap:5,
              opacity:cnt===0?0.35:1,
            }}>
              {t}
              {cnt>0&&(
                <span style={{
                  fontSize:9,fontWeight:800,
                  background:on?col:"#1a2236",
                  color:on?"#fff":col,
                  borderRadius:99,padding:"1px 5px",
                  minWidth:16,textAlign:"center",
                }}>{cnt}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* エピソード一覧 */}
      {allEps.length===0?(
        <div style={{textAlign:"center",color:"#8899bb",padding:"40px 20px",fontSize:13,background:"#131929",borderRadius:14,border:"1px solid #222d42"}}>
          <div style={{fontSize:24,marginBottom:8}}>📝</div>
          面接準備 → 自分史・強みの木に<br/>エピソードを入力すると表示されます
        </div>
      ):matched.length===0?(
        <div style={{textAlign:"center",color:"#8899bb",padding:"32px 0",fontSize:12}}>
          {filterTags.map(t=><span key={t} style={{margin:"0 3px",color:EP_TAG_COLORS[t]||"#8899bb",fontWeight:700}}>#{t}</span>)}のエピソードが見つかりません
        </div>
      ):(
        <div>
          {filterTags.length>0&&<div style={{fontSize:11,color:"#8899bb",marginBottom:8}}>{matched.length}件ヒット</div>}
          {matched.map((ep,i)=>(
            <div key={ep.id} style={{background:"#131929",border:"1px solid #222d42",borderRadius:14,padding:"16px",marginBottom:10}}>
              {/* エピソード名 + 感情度 */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:8}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700,color:"#f0f4ff",marginBottom:3}}>{ep.era}</div>
                  <div style={{fontSize:10,color:"#8899bb"}}>{ep.source==="history"?"自分史":"強みの木"}</div>
                </div>
                <div style={{display:"flex",gap:2,flexShrink:0}}>{[1,2,3,4,5].map(si=><span key={si} style={{fontSize:12,color:si<=ep.motivation?"#f97316":"#2a3347"}}>★</span>)}</div>
              </div>

              {/* タグバッジ */}
              {ep.tags.length>0&&(
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                  {ep.tags.map(t=>(
                    <span key={t} style={{
                      fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,
                      color:EP_TAG_COLORS[t]||"#8899bb",
                      background:(EP_TAG_COLORS[t]||"#8899bb")+"22",
                      border:`1px solid ${(EP_TAG_COLORS[t]||"#8899bb")}44`,
                    }}>#{t}</span>
                  ))}
                </div>
              )}

              {/* エピソード内容 */}
              {ep.event&&<div style={{fontSize:13,color:"#c8d8f0",lineHeight:1.7,marginBottom:6,padding:"8px 10px",background:"#0a0e17",borderRadius:8,borderLeft:"2px solid #8899bb"}}>
                <div style={{fontSize:9,color:"#8899bb",fontWeight:700,marginBottom:3}}>📌 経験・出来事</div>
                {ep.event}
              </div>}
              {ep.emotion&&<div style={{fontSize:13,color:"#a5b4fc",lineHeight:1.7,marginBottom:6,padding:"8px 10px",background:"#0a0e17",borderRadius:8,borderLeft:"2px solid #6366f1"}}>
                <div style={{fontSize:9,color:"#8899bb",fontWeight:700,marginBottom:3}}>💭 感情・気づき</div>
                {ep.emotion}
              </div>}
              {ep.skill&&<div style={{fontSize:13,color:"#4ade80",lineHeight:1.7,padding:"8px 10px",background:"#0a0e17",borderRadius:8,borderLeft:"2px solid #22c55e"}}>
                <div style={{fontSize:9,color:"#8899bb",fontWeight:700,marginBottom:3}}>💡 得たもの・強み</div>
                {ep.skill}
              </div>}

              {/* コピーボタン */}
              <div style={{marginTop:10,display:"flex",justifyContent:"flex-end",gap:6}}>
                {ep.event&&<CBtn text={ep.event} label="経験コピー"/>}
                <CBtn text={[ep.event,ep.emotion,ep.skill].filter(Boolean).join("\n\n")} label="全コピー"/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  },[]);

  // Deadline notifications (single, safe implementation)
  useEffect(()=>{
    if(typeof Notification==="undefined")return;
    if(Notification.permission==="default")Notification.requestPermission();
    if(!loaded||Notification.permission!=="granted")return;
    const timers=[];
    companies.forEach(c=>{
      if(!c.deadline)return;
      const dt=new Date(c.deadline),diff=dt-new Date();
      if(diff>0&&diff<172800000){
        timers.push(setTimeout(()=>{try{new Notification(`締切: ${c.name}`,{body:`${c.deadlineType||"締切"} まもなく`});}catch{}},Math.max(0,diff-3600000)));
      }
    });
    return()=>timers.forEach(clearTimeout);
  },[companies,loaded]);

  const getPayload=(cos,nid)=>({companies:cos,nextId:nid,esBank,prep,obVisits,completedDLs});
  const triggerSave=(payload)=>{
    setSyncMsg("保存中");clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{await dbSave(payload);setSyncMsg("✓ 同期済");setTimeout(()=>setSyncMsg(""),2000);},600);
  };
  const update=(next,nid)=>{
    const id=nid!==undefined?nid:nextId;
    setCompanies(next);if(nid!==undefined)setNextId(nid);
    triggerSave({...getPayload(next,id),companies:next,nextId:id});
  };
  const updateEs=(next)=>{setEsBank(next);triggerSave({...getPayload(companies,nextId),esBank:next});};
  const updatePrep=(next)=>{setPrep(next);triggerSave({...getPayload(companies,nextId),prep:next});};
  const updateOb=(next)=>{setObVisits(next);triggerSave({...getPayload(companies,nextId),obVisits:next});};
  const updateCompletedDLs=(next)=>{setCompletedDLs(next);triggerSave({...getPayload(companies,nextId),completedDLs:next});};

  const counts=STATUSES.reduce((acc,s)=>{acc[s]=companies.filter(c=>c.status===s).length;return acc;},{});
  const handleSave=data=>{
    if(editTarget?.id)update(companies.map(c=>c.id===editTarget.id?{...c,...data}:c));
    else update([...companies,{id:nextId,...data}],nextId+1);
    setEditTarget(null);
  };
  const handleSC=(id,status)=>{
    const updated=companies.map(c=>{
      if(c.id!==id)return c;
      const history=[...(c.history||[]),{id:Date.now(),stage:status,note:""}];
      const rejectedAt=(status==="不合格"||status==="辞退")?c.status:(c.rejectedAt||"");
      return{...c,status,history,rejectedAt};
    });
    update(updated);
    // 不合格・辞退時にメンタルケアポップアップ
    if(status==="不合格"||status==="辞退"){
      const target=updated.find(c=>c.id===id);
      if(target) setTimeout(()=>setMentalTarget(target),300);
    }
  };
  const handlePriority=(id,priority)=>update(companies.map(c=>c.id===id?{...c,priority}:c));
  const del=id=>{if(window.confirm("削除しますか？"))update(companies.filter(c=>c.id!==id));};

  const waitN=STATUSES.filter(s=>s.includes("結果待ち")).reduce((s,k)=>s+(counts[k]||0),0);

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:"#0d1117",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 8px 32px rgba(99,102,241,.4)"}}>🎯</div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:15,fontWeight:800,color:"#fff",marginBottom:4}}>内定ナビ</div>
        <div style={{color:"#64748b",fontSize:12,letterSpacing:.5}}>データを読み込んでいます…</div>
      </div>
      <div style={{width:32,height:32,border:"2px solid #1e293b",borderTop:"2px solid #6366f1",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#0a0e17",paddingBottom:120}}>
      <div className="app-header">
        {/* ブランド行 */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="brand">
            <div className="brand-icon">🎯</div>
            <div>
              <div className="brand-name">内定ナビ</div>
              <div className="brand-sub">AI搭載就活管理アプリ</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {syncMsg&&<span style={{fontSize:10,color:syncMsg.includes("✓")?"#22c55e":"#64748b"}}>{syncMsg}</span>}
            <button className="btn" onClick={()=>setEditTarget(EMPTY)}
              style={{background:"#6366f1",color:"#fff",borderRadius:10,
                padding:"9px 18px",fontSize:13,fontWeight:800,
                boxShadow:"0 4px 14px rgba(99,102,241,.35)"}}>
              ＋ 追加
            </button>
          </div>
        </div>

        {/* 進捗バー */}
        {(()=>{
          const total=companies.filter(c=>c.status!=="未着手").length;
          const done=(counts["内定"]||0);
          const pct=total>0?Math.min(100,Math.round(done/Math.max(total,1)*100)):0;
          const active=["最終","4次","3次","2次","1次","GD","面談","テスト","書類待ち","書類結果待ち"].reduce((s,k)=>s+(counts[k]||0),0);
          return(
            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:11,color:"#64748b",fontWeight:600}}>就活進捗</span>
                <span style={{fontSize:11,color:"#a5b4fc",fontWeight:700}}>
                  応募{total}社 · 選考中{active}社 · 内定{done}社
                </span>
              </div>
              <div className="progress-bar-wrap">
                <div className="progress-bar-fill" style={{width:`${total>0?Math.max(5,Math.round(active/Math.max(total,1)*100)):0}%`}}/>
              </div>
            </div>
          );
        })()}

        {/* スタット4枚 */}
        <div className="stat-row">
          {[
            {l:"内定",n:counts["内定"]||0,c:"#22c55e"},
            {l:"結果待ち",n:waitN,c:"#a78bfa"},
            {l:"選考中",n:["最終","4次","3次","2次","1次","GD","面談"].reduce((s,k)=>s+(counts[k]||0),0),c:"#60a5fa"},
            {l:"書類準備",n:(counts["テスト"]||0)+(counts["書類待ち"]||0)+(counts["書類結果待ち"]||0),c:"#f97316"},
          ].map(s=>(
            <div key={s.l} className="stat-card">
              <div className="stat-card-n" style={{color:s.c}}>{s.n}</div>
              <div className="stat-card-l" style={{color:s.c}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* タブ */}
        <div className="tab-row">
          {[
            {id:"list",label:"一覧",icon:"📋"},
            {id:"ai",label:"AI",icon:"✨"},
            {id:"prep",label:"準備",icon:"🧠"},
            {id:"cal",label:"予定",icon:"📅"},
            {id:"analytics",label:"分析",icon:"📊"},
            {id:"cmp",label:"比較",icon:"⚖️"},
            {id:"es",label:"ES",icon:"📝"},
            {id:"kanpe",label:"カンペ",icon:"⚡"},
            {id:"ep",label:"検索",icon:"🔍"},
            {id:"ob",label:"OB",icon:"👥"},
            {id:"guide",label:"ガイド",icon:"🚀"},
          ].map(({id,label,icon})=>(
            <button key={id} className={`newtab${tab===id?" on":""}`}
              onClick={()=>setTab(id)}>
              {icon} {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
{/* 意思決定支援: 今日のタスク */}
        <TodayDashboard companies={companies} completedDLs={completedDLs} onToggleDL={key=>updateCompletedDLs(completedDLs.includes(key)?completedDLs.filter(k=>k!==key):[...completedDLs,key])} onOpenCompany={co=>setEditTarget(ens(co))}/>
        {tab==="guide"&&<StarterGuide
          companies={companies} prep={prep} esBank={esBank}
          onTabChange={t=>setTab(t)}
          onAIStart={()=>{setAiInitialSection("start");setTab("ai");}}
        />}
        {tab==="list"&&(
          <div>
            {companies.filter(c=>c.status!=="未着手").length===0&&(
              <div style={{
                background:"linear-gradient(135deg,#1a1040,#2e1065)",
                border:"1px solid #3730a3",borderRadius:16,
                padding:"24px 20px",marginBottom:14,textAlign:"center"
              }}>
                <div style={{fontSize:32,marginBottom:12}}>🚀</div>
                <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:8}}>就活管理を始めよう</div>
                <div style={{fontSize:13,color:"#c4b5fd",marginBottom:18,lineHeight:1.7}}>
                  企業を登録すると「今日やること」が<br/>自動で整理されます
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button className="btn" onClick={()=>setEditTarget(EMPTY)}
                    style={{background:"#6366f1",color:"#fff",borderRadius:12,
                      padding:"13px",fontSize:14,fontWeight:800,width:"100%",
                      boxShadow:"0 4px 16px rgba(99,102,241,.4)"}}>
                    ＋ 最初の企業を登録する
                  </button>
                  <button className="btn" onClick={()=>{setAiInitialSection("start");setTab("ai");}}
                    style={{background:"transparent",color:"#a5b4fc",borderRadius:12,
                      padding:"11px",fontSize:13,fontWeight:700,width:"100%",
                      border:"1px solid #3730a3"}}>
                    ✨ AIに就活の進め方を聞く
                  </button>
                </div>
              </div>
            )}
            <ListView companies={companies} filter={filter} setFilter={setFilter} counts={counts} onStatusChange={handleSC} onDetail={c=>setEditTarget(ens(c))} onDel={del} onPriorityChange={handlePriority} completedDLs={completedDLs} onToggleDL={key=>updateCompletedDLs(completedDLs.includes(key)?completedDLs.filter(k=>k!==key):[...completedDLs,key])}/>
          </div>
        )}}
        {tab==="cal"&&<CalView companies={companies} onEdit={c=>setEditTarget(ens(c))}/>}
        {tab==="analytics"&&<AnalyticsTab companies={companies}/>}
        {tab==="kanpe"&&<QuickCheckTab companies={companies} prep={prep}/>}
        {tab==="cmp"&&<CompareView companies={companies} onEdit={c=>setEditTarget(ens(c))}/>}
        {tab==="es"&&<ESBank esBank={esBank} onChange={updateEs} onGoAI={()=>{setAiInitialSection("es");setTab("ai");}}/>}
        {tab==="prep"&&<PrepTab prep={prep} onChange={updatePrep}/>}
        {tab==="ep"&&<EpisodeFinder prep={prep}/>}
        {tab==="ob"&&<OBVisits visits={obVisits} onChange={updateOb}/>}
        {tab==="ai"&&(
          <div>
            <AITab companies={companies} prep={prep} esBank={esBank} onEsAdd={es=>updateEs([...esBank,es])} initialSection={aiInitialSection} onSectionChange={setAiInitialSection}/>
          </div>
        )}
      </div>

      {editTarget&&<EditSheet company={editTarget} onSave={handleSave} onClose={()=>setEditTarget(null)} prep={prep} esBank={esBank} onEsAdd={es=>updateEs([...esBank,es])}/>}
      {mentalTarget&&<MentalCareModal company={mentalTarget} onClose={()=>setMentalTarget(null)} apiKey={localStorage.getItem("jt-ai-key")||""}/>}
      
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
